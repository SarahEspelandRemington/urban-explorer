name: CI

# NOTE: The "report" job uses GITHUB_TOKEN to write PR comments.
# GITHUB_TOKEN for PRs from forks is read-only and cannot post comments, so
# the job is guarded with `github.event.pull_request.head.repo.fork == false`
# to skip gracefully for fork contributors. Individual jobs still fail with the
# correct exit code so the PR status check remains accurate.

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Record job start time
        run: echo "JOB_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Get pnpm store path
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      # Layer 1 — stable packages (root devtools + libs).
      # Keyed on stable manifests only so changes confined to artifacts don't
      # bust this entry.  restore-keys falls back to any previous stable entry.
      - name: Restore pnpm store — stable layer (root devtools + libs)
        id: pnpm-cache-stable
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-stable-${{ runner.os }}-${{ hashFiles('package.json', 'pnpm-workspace.yaml', 'lib/**/package.json', 'scripts/package.json') }}
          restore-keys: |
            pnpm-store-stable-${{ runner.os }}-

      # Layer 2 — full resolved lockfile.  On exact hit pnpm installs nothing;
      # on miss it downloads only packages absent from the stable layer above.
      - name: Restore pnpm store — full lockfile
        id: pnpm-cache-full
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-full-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-full-${{ runner.os }}-

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/api-server/node_modules
            artifacts/mockup-sandbox/node_modules
            artifacts/urban-explorer/node_modules
            lib/api-client-react/node_modules
            lib/api-zod/node_modules
            lib/api-spec/node_modules
            lib/db/node_modules
            lib/integrations-openai-ai-server/node_modules
            lib/integrations/openai_ai_integrations/node_modules
            scripts/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      # Save the stable-layer cache only when it was not a hit, so we don't
      # upload an unchanged snapshot on every run.
      - name: Save pnpm store — stable layer
        if: steps.pnpm-cache-stable.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ steps.pnpm-cache-stable.outputs.cache-primary-key }}

      # Save the full-lockfile cache only on a miss, avoiding duplicate uploads
      # when the lockfile hasn't changed since the last run.
      - name: Save pnpm store — full lockfile
        if: steps.pnpm-cache-full.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ steps.pnpm-cache-full.outputs.cache-primary-key }}

      - name: Record install duration
        if: always()
        run: |
          duration_s=$(( $(date +%s) - ${JOB_START_EPOCH:-0} ))
          printf '{"duration_s":%d,"sha":"%s","ref":"%s"}\n' \
            "${duration_s}" "${GITHUB_SHA}" "${GITHUB_REF_NAME}" \
            > install-counts.json

      - name: Upload install counts artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-counts
          path: install-counts.json
          retention-days: 90

  format:
    name: Format (Prettier)
    runs-on: ubuntu-latest
    needs: install
    outputs:
      format_error_count: ${{ steps.format.outputs.format_error_count }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/api-server/node_modules
            artifacts/mockup-sandbox/node_modules
            artifacts/urban-explorer/node_modules
            lib/api-client-react/node_modules
            lib/api-zod/node_modules
            lib/api-spec/node_modules
            lib/db/node_modules
            lib/integrations-openai-ai-server/node_modules
            lib/integrations/openai_ai_integrations/node_modules
            scripts/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Check formatting (Prettier)
        id: format
        run: |
          # Capture the format check result without exiting immediately so we
          # can always write format-counts.json for cross-run trend comparison.
          format_start_s=$SECONDS
          set +e
          pnpm run format:check
          format_exit=$?
          format_duration_s=$((SECONDS - format_start_s))
          set -e

          # Count unformatted files for trend tracking.
          # If the check passed there are none; otherwise run list-different to count.
          if [ $format_exit -eq 0 ]; then
            format_error_count=0
          else
            format_error_count=$(pnpm prettier --list-different . 2>/dev/null | wc -l | tr -d ' ')
          fi
          echo "format_error_count=${format_error_count}" >> "$GITHUB_OUTPUT"

          # Write a JSON artifact so error counts can be compared across runs.
          # errors = number of unformatted files; warnings are always 0 for Prettier.
          printf '{"errors":%d,"warnings":%d,"duration_s":%d,"sha":"%s","ref":"%s"}\n' \
            "${format_error_count}" 0 "${format_duration_s}" \
            "${GITHUB_SHA}" "${GITHUB_REF_NAME}" \
            > format-counts.json

          if [ $format_exit -ne 0 ]; then
            echo "## ❌ Formatting check failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "One or more files are not formatted with Prettier." >> "$GITHUB_STEP_SUMMARY"
            echo "Run the following command locally to fix:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "pnpm run format && git commit -a --amend --no-edit" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Then push again." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            # Collect unformatted files
            mapfile -t BAD_FILES < <(pnpm prettier --list-different . 2>/dev/null)

            # Build a combined unified diff for all unformatted files
            DIFF_OUTPUT=""
            for file in "${BAD_FILES[@]}"; do
              FILE_DIFF=$(diff -u "$file" <(pnpm prettier --stdin-filepath "$file" < "$file" 2>/dev/null) || true)
              if [ -n "$FILE_DIFF" ]; then
                DIFF_OUTPUT+="$FILE_DIFF"$'\n'
              fi
            done

            # Truncate diff if it exceeds 100 lines
            DIFF_LINE_COUNT=$(echo "$DIFF_OUTPUT" | wc -l)
            TRUNCATED=false
            if [ "$DIFF_LINE_COUNT" -gt 100 ]; then
              DIFF_OUTPUT=$(echo "$DIFF_OUTPUT" | head -n 100)
              TRUNCATED=true
            fi

            # Write collapsible diff block to step summary
            echo "<details>" >> "$GITHUB_STEP_SUMMARY"
            echo "<summary>📄 Diff — click to expand</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```diff' >> "$GITHUB_STEP_SUMMARY"
            echo "$DIFF_OUTPUT" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            if [ "$TRUNCATED" = true ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "_Diff truncated at 100 lines. Run \`pnpm run format\` locally to see the full output._" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"

            echo ""
            echo "❌ Formatting issues detected. Run the following command locally to fix:"
            echo ""
            echo "    pnpm run format && git commit -a --amend --no-edit"
            echo ""
            echo "Then push again."
            for file in "${BAD_FILES[@]}"; do
              echo "::error file=${file}::File is not formatted with Prettier"
            done
            exit 1
          fi

      - name: Upload format counts artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: format-counts
          path: format-counts.json
          retention-days: 90

  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    needs: install
    outputs:
      lint_output: ${{ steps.lint.outputs.lint_output }}
      lint_warning_count: ${{ steps.lint.outputs.lint_warning_count }}
      lint_error_count: ${{ steps.lint.outputs.lint_error_count }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/api-server/node_modules
            artifacts/mockup-sandbox/node_modules
            artifacts/urban-explorer/node_modules
            lib/api-client-react/node_modules
            lib/api-zod/node_modules
            lib/api-spec/node_modules
            lib/db/node_modules
            lib/integrations-openai-ai-server/node_modules
            lib/integrations/openai_ai_integrations/node_modules
            scripts/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Lint (ESLint)
        id: lint
        run: |
          # Temporarily disable errexit so a non-zero exit from ESLint doesn't
          # short-circuit the script before we can capture the exit code and
          # counts. We restore it immediately after the subshell completes.
          lint_start_s=$SECONDS
          set +e
          lint_output=$(pnpm run lint 2>&1)
          lint_exit=$?
          lint_duration_s=$((SECONDS - lint_start_s))
          set -e
          echo "$lint_output"

          # Always count errors and warnings so trend data is available even on a
          # clean run. These are written to GITHUB_OUTPUT and to lint-counts.json
          # for cross-run comparison.
          lint_error_count=$(printf '%s\n' "$lint_output" | grep -c '[[:space:]]error[[:space:]]' || true)
          lint_warning_count=$(printf '%s\n' "$lint_output" | grep -c '[[:space:]]warning[[:space:]]' || true)

          echo "lint_warning_count=${lint_warning_count}" >> "$GITHUB_OUTPUT"
          echo "lint_error_count=${lint_error_count}" >> "$GITHUB_OUTPUT"

          # Write a JSON artifact so warning trends can be compared across runs.
          printf '{"errors":%d,"warnings":%d,"duration_s":%d,"sha":"%s","ref":"%s"}\n' \
            "$lint_error_count" "$lint_warning_count" "${lint_duration_s}" \
            "${GITHUB_SHA}" "${GITHUB_REF_NAME}" \
            > lint-counts.json

          if [ $lint_exit -ne 0 ]; then
            # Emit GitHub Actions ::error / ::warning annotations for every ESLint
            # diagnostic so GitHub highlights the offending line directly in the PR
            # diff view. ESLint default output: file header at col 0, then indented
            # "line:col  error|warning  msg  rule"
            printf '%s\n' "$lint_output" | awk '
              /^[^ \t]/ && /\.(ts|tsx|js|jsx|mjs|cjs)/ { current_file = $0; next }
              /[[:space:]]error[[:space:]]/ {
                split($1, loc, ":")
                line_num = loc[1]; col_num = loc[2]
                msg = ""
                for (i = 3; i <= NF-1; i++) msg = (msg == "" ? $i : msg " " $i)
                printf "::error file=%s,line=%s,col=%s::%s\n", current_file, line_num, col_num, msg
              }
              /[[:space:]]warning[[:space:]]/ {
                split($1, loc, ":")
                line_num = loc[1]; col_num = loc[2]
                msg = ""
                for (i = 3; i <= NF-1; i++) msg = (msg == "" ? $i : msg " " $i)
                printf "::warning file=%s,line=%s,col=%s::%s\n", current_file, line_num, col_num, msg
              }
            '

            # Build a per-file error/warning summary from ESLint's default output.
            # File header lines start at column 0 and contain a source extension;
            # error/warning lines are indented and contain the word "error"/"warning".
            # Summary rows include the first-error line number: file.ts:42 — N error(s), M warning(s): msg
            lint_file_list=$(printf '%s\n' "$lint_output" | awk '
              /^[^ \t]/ && /\.(ts|tsx|js|jsx|mjs|cjs)/ { current_file = $0; next }
              /[[:space:]]error[[:space:]]/ {
                split($1, loc, ":")
                line_num = loc[1]
                ecount[current_file]++
                if (!first_msg[current_file]) {
                  msg = ""
                  for (i = 3; i <= NF-1; i++) msg = (msg == "" ? $i : msg " " $i)
                  first_msg[current_file] = msg
                  first_line[current_file] = line_num
                }
              }
              /[[:space:]]warning[[:space:]]/ {
                split($1, loc, ":")
                line_num = loc[1]
                wcount[current_file]++
                if (!first_msg[current_file]) {
                  msg = ""
                  for (i = 3; i <= NF-1; i++) msg = (msg == "" ? $i : msg " " $i)
                  first_msg[current_file] = msg
                  first_line[current_file] = line_num
                }
              }
              END {
                for (f in ecount) seen[f] = 1
                for (f in wcount) seen[f] = 1
                for (f in seen)
                  if (f != "")
                    printf "- `%s:%s` — %d error(s), %d warning(s): %s\n", f, first_line[f], ecount[f]+0, wcount[f]+0, first_msg[f]
              }
            ' | sort)
            lint_file_count=$(printf '%s\n' "$lint_file_list" | grep -c '^-' || true)

            echo "## ❌ Lint failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ -n "$lint_file_list" ]; then
              echo "**${lint_error_count} error(s), ${lint_warning_count} warning(s) across ${lint_file_count} file(s):**" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              printf '%s\n' "$lint_file_list" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "ESLint reported errors. Fix them locally with:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "pnpm run lint" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Full lint output</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$lint_output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            truncated=$(echo "$lint_output" | head -c 5000)
            echo "lint_output<<ENDOFOUTPUT" >> "$GITHUB_OUTPUT"
            echo "$truncated" >> "$GITHUB_OUTPUT"
            echo "ENDOFOUTPUT" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Upload lint counts artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-counts
          path: lint-counts.json
          retention-days: 90

  typecheck:
    name: Typecheck (TypeScript)
    runs-on: ubuntu-latest
    needs: install
    outputs:
      tc_output: ${{ steps.typecheck.outputs.tc_output }}
      tc_error_count: ${{ steps.typecheck.outputs.tc_error_count }}
      tc_warning_count: ${{ steps.typecheck.outputs.tc_warning_count }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/api-server/node_modules
            artifacts/mockup-sandbox/node_modules
            artifacts/urban-explorer/node_modules
            lib/api-client-react/node_modules
            lib/api-zod/node_modules
            lib/api-spec/node_modules
            lib/db/node_modules
            lib/integrations-openai-ai-server/node_modules
            lib/integrations/openai_ai_integrations/node_modules
            scripts/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Restore TypeScript build cache (db)
        uses: actions/cache@v4
        with:
          path: |
            lib/db/dist
            lib/db/*.tsbuildinfo
          key: tsbuildinfo-db-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/db/tsconfig.json', 'lib/db/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-db-${{ runner.os }}-

      - name: Restore codegen cache (api-spec)
        uses: actions/cache@v4
        with:
          path: |
            lib/api-zod/src/generated
            lib/api-client-react/src/generated
          key: codegen-api-spec-${{ runner.os }}-${{ hashFiles('lib/api-spec/openapi.yaml', 'lib/api-spec/orval.config.ts') }}
          restore-keys: |
            codegen-api-spec-${{ runner.os }}-

      - name: Restore TypeScript build cache (api-zod)
        uses: actions/cache@v4
        with:
          path: |
            lib/api-zod/dist
            lib/api-zod/*.tsbuildinfo
          key: tsbuildinfo-api-zod-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/api-zod/tsconfig.json', 'lib/api-zod/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-api-zod-${{ runner.os }}-

      - name: Restore TypeScript build cache (api-client-react)
        uses: actions/cache@v4
        with:
          path: |
            lib/api-client-react/dist
            lib/api-client-react/*.tsbuildinfo
          key: tsbuildinfo-api-client-react-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/api-client-react/tsconfig.json', 'lib/api-client-react/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-api-client-react-${{ runner.os }}-

      - name: Restore TypeScript build cache (integrations-openai-ai-server)
        uses: actions/cache@v4
        with:
          path: |
            lib/integrations-openai-ai-server/dist
            lib/integrations-openai-ai-server/*.tsbuildinfo
          key: tsbuildinfo-integrations-openai-ai-server-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/integrations-openai-ai-server/tsconfig.json', 'lib/integrations-openai-ai-server/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-integrations-openai-ai-server-${{ runner.os }}-

      - name: Restore TypeScript solution build cache (root)
        uses: actions/cache@v4
        with:
          path: tsconfig.tsbuildinfo
          key: tsbuildinfo-root-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'tsconfig.base.json') }}
          restore-keys: |
            tsbuildinfo-root-${{ runner.os }}-

      - name: Typecheck (TypeScript)
        id: typecheck
        run: |
          tc_start_s=$SECONDS
          set +e
          tc_output=$(pnpm run typecheck 2>&1)
          tc_exit=$?
          tc_duration_s=$((SECONDS - tc_start_s))
          set -e
          echo "$tc_output"

          # Always count diagnostics so trend data is available even on a clean run.
          tc_error_count=$(printf '%s\n' "$tc_output" | grep -c ': error TS' || true)
          tc_warning_count=$(printf '%s\n' "$tc_output" | grep -c ': warning TS' || true)
          echo "tc_error_count=${tc_error_count}" >> "$GITHUB_OUTPUT"
          echo "tc_warning_count=${tc_warning_count}" >> "$GITHUB_OUTPUT"

          # Write a JSON artifact so warning trends can be compared across runs.
          printf '{"errors":%d,"warnings":%d,"duration_s":%d,"sha":"%s","ref":"%s"}\n' \
            "$tc_error_count" "$tc_warning_count" "${tc_duration_s}" \
            "${GITHUB_SHA}" "${GITHUB_REF_NAME}" \
            > tc-counts.json

          if [ $tc_exit -ne 0 ]; then

            # Emit GitHub Actions ::error / ::warning annotations for every tsc
            # diagnostic so GitHub highlights the offending line directly in the
            # PR diff view.
            # tsc diagnostic lines: path/to/file.ts(line,col): error|warning TSxxxx: message
            printf '%s\n' "$tc_output" | awk '
              /: error TS/ {
                f = $0; sub(/\(.*/, "", f); gsub(/^[[:space:]]+|[[:space:]]+$/, "", f)
                loc = $0; sub(/^[^(]*\(/, "", loc); sub(/\):.*/, "", loc)
                split(loc, pos, ",")
                line_num = pos[1]; col_num = pos[2]
                msg = $0; sub(/.*: error TS[0-9]+: /, "", msg)
                if (f != "")
                  printf "::error file=%s,line=%s,col=%s::%s\n", f, line_num, col_num, msg
              }
              /: warning TS/ {
                f = $0; sub(/\(.*/, "", f); gsub(/^[[:space:]]+|[[:space:]]+$/, "", f)
                loc = $0; sub(/^[^(]*\(/, "", loc); sub(/\):.*/, "", loc)
                split(loc, pos, ",")
                line_num = pos[1]; col_num = pos[2]
                msg = $0; sub(/.*: warning TS[0-9]+: /, "", msg)
                if (f != "")
                  printf "::warning file=%s,line=%s,col=%s::%s\n", f, line_num, col_num, msg
              }
            '

            # Build a per-file error/warning summary from tsc output.
            # tsc diagnostic lines: path/to/file.ts(line,col): error|warning TSxxxx: …
            # Summary rows include the first-diagnostic line number: file.ts:42 — N error(s), M warning(s): msg
            tc_file_list=$(printf '%s\n' "$tc_output" | awk '
              /: error TS/ {
                f = $0
                sub(/\(.*/, "", f)
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", f)
                loc = $0; sub(/^[^(]*\(/, "", loc); sub(/\):.*/, "", loc)
                split(loc, pos, ",")
                line_num = pos[1]
                if (f != "") {
                  ecount[f]++
                  if (!first_msg[f]) {
                    msg = $0
                    sub(/.*: error /, "", msg)
                    first_msg[f] = msg
                    first_line[f] = line_num
                  }
                }
              }
              /: warning TS/ {
                f = $0
                sub(/\(.*/, "", f)
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", f)
                loc = $0; sub(/^[^(]*\(/, "", loc); sub(/\):.*/, "", loc)
                split(loc, pos, ",")
                line_num = pos[1]
                if (f != "") {
                  wcount[f]++
                  if (!first_msg[f]) {
                    msg = $0
                    sub(/.*: warning /, "", msg)
                    first_msg[f] = msg
                    first_line[f] = line_num
                  }
                }
              }
              END {
                for (f in ecount) seen[f] = 1
                for (f in wcount) seen[f] = 1
                for (f in seen)
                  if (f != "")
                    printf "- `%s:%s` — %d error(s), %d warning(s): %s\n", f, first_line[f], ecount[f]+0, wcount[f]+0, first_msg[f]
              }
            ' | sort)
            tc_file_count=$(printf '%s\n' "$tc_file_list" | grep -c '^-' || true)

            echo "## ❌ Typecheck failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ -n "$tc_file_list" ]; then
              echo "**${tc_error_count} error(s), ${tc_warning_count} warning(s) across ${tc_file_count} file(s):**" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              printf '%s\n' "$tc_file_list" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "TypeScript reported type errors. Fix them locally with:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "pnpm run typecheck" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Full typecheck output</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$tc_output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            truncated=$(echo "$tc_output" | head -c 5000)
            echo "tc_output<<ENDOFOUTPUT" >> "$GITHUB_OUTPUT"
            echo "$truncated" >> "$GITHUB_OUTPUT"
            echo "ENDOFOUTPUT" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Upload typecheck counts artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tc-counts
          path: tc-counts.json
          retention-days: 90

  record-warn-history:
    name: Record warning history
    runs-on: ubuntu-latest
    needs: [lint, typecheck, format, build]
    # Informational only — runs even when lint/typecheck/format/build fail so
    # we always capture the counts and write the job summary. Skipped for fork
    # PRs (no write token). continue-on-error keeps transient GitHub API
    # failures from blocking the PR.
    if: always() && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false))
    continue-on-error: true
    steps:
      - name: Download previous warn-history artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # github.head_ref is set on pull_request events; for push events use
          # github.ref_name (the branch that was pushed to).
          head_ref="${{ github.head_ref || github.ref_name }}"
          current_run_id="${{ github.run_id }}"

          prev_run_id=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch "$head_ref" \
            --workflow "ci.yml" \
            --limit 10 \
            --json databaseId \
            --jq "[.[] | select(.databaseId != ${current_run_id})] | .[0].databaseId" \
            2>/dev/null || true)

          mkdir -p /tmp/warn-history

          if [ -n "$prev_run_id" ] && [ "$prev_run_id" != "null" ]; then
            gh run download "$prev_run_id" \
              --repo "${{ github.repository }}" \
              --name warn-history \
              --dir /tmp/warn-history 2>/dev/null || true
          fi

          if [ ! -f /tmp/warn-history/warn-history.json ]; then
            echo "[]" > /tmp/warn-history/warn-history.json
          fi

      - name: Download job timing artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/job-counts
          for artifact in lint-counts tc-counts format-counts build-counts install-counts; do
            gh run download "${{ github.run_id }}" \
              --repo "${{ github.repository }}" \
              --name "$artifact" \
              --dir "/tmp/job-counts/${artifact}" 2>/dev/null || true
          done

      - name: Append current counts and cap history
        env:
          LINT_WARNINGS: ${{ needs.lint.outputs.lint_warning_count }}
          TC_WARNINGS: ${{ needs.typecheck.outputs.tc_warning_count }}
          FORMAT_ERRORS: ${{ needs.format.outputs.format_error_count }}
        run: |
          # Use null (JSON null) when a job was skipped/cancelled so we don't
          # silently record 0 and distort the trend sparkline downward.
          lint_w="${LINT_WARNINGS}"
          tc_w="${TC_WARNINGS}"
          format_e="${FORMAT_ERRORS}"
          [ -z "$lint_w" ]   && lint_json="null"   || lint_json="$lint_w"
          [ -z "$tc_w" ]     && tc_json="null"     || tc_json="$tc_w"
          [ -z "$format_e" ] && format_json="null" || format_json="$format_e"
          sha="${GITHUB_SHA}"
          short_sha="${sha:0:7}"
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Read per-job durations captured by each job's counts artifact.
          lint_s=$(jq -r '.duration_s // 0' /tmp/job-counts/lint-counts/lint-counts.json 2>/dev/null || echo "0")
          tc_s=$(jq -r '.duration_s // 0' /tmp/job-counts/tc-counts/tc-counts.json 2>/dev/null || echo "0")
          format_s=$(jq -r '.duration_s // 0' /tmp/job-counts/format-counts/format-counts.json 2>/dev/null || echo "0")
          build_s=$(jq -r '.duration_s // 0' /tmp/job-counts/build-counts/build-counts.json 2>/dev/null || echo "0")
          install_s=$(jq -r '.duration_s // 0' /tmp/job-counts/install-counts/install-counts.json 2>/dev/null || echo "0")
          # Sum lint + tc + format + build as total compile/check work seconds.
          total_build_s=$((lint_s + tc_s + format_s + build_s))

          # Write combined time-counts.json for downstream consumers.
          printf '{"install_s":%d,"lint_s":%d,"tc_s":%d,"format_s":%d,"build_s":%d,"total_s":%d,"sha":"%s","ref":"%s"}\n' \
            "${install_s}" "${lint_s}" "${tc_s}" "${format_s}" "${build_s}" \
            "$((install_s + lint_s + tc_s + format_s + build_s))" \
            "${sha}" "${GITHUB_REF_NAME}" \
            > /tmp/time-counts.json

          history=$(cat /tmp/warn-history/warn-history.json)
          # build_s  = total (lint + tc + format + build step) — kept for backward
          #            compat with build-time-gate which reads this field.
          # build_job_s = only the build step; distinguishes from the total.
          new_entry="{\"sha\":\"${sha}\",\"shortSha\":\"${short_sha}\",\"ts\":\"${ts}\",\"lint\":${lint_json},\"tc\":${tc_json},\"format\":${format_json},\"lint_s\":${lint_s},\"tc_s\":${tc_s},\"format_s\":${format_s},\"build_job_s\":${build_s},\"build_s\":${total_build_s}}"
          # Append new entry and keep only the last 20 to avoid unbounded growth.
          updated=$(printf '%s\n' "$history" | jq --argjson entry "$new_entry" '. + [$entry] | .[-20:]')
          echo "$updated" > /tmp/warn-history/warn-history.json

      - name: Write warning trend to job summary
        run: |
          history_file="/tmp/warn-history/warn-history.json"

          {
            echo "## 📈 Warning Trend"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          count=$(jq 'length' "$history_file")

          if [ "$count" -lt 2 ]; then
            echo "_Not enough history yet — need at least 2 runs on this branch._" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # Last 5 entries (the file is already capped at 20).
          last5=$(jq '.[-5:]' "$history_file")

          {
            echo "| SHA | Date | Lint ⚠️ | TS ⚠️ | Format errors | Build time |"
            echo "|-----|------|---------|-------|---------------|------------|"
          } >> "$GITHUB_STEP_SUMMARY"

          # Emit one table row per entry. Null counts (skipped/cancelled jobs)
          # are rendered as "—" rather than 0 to avoid misleading the reader.
          # Old entries without a "format" field default to 0 for backward compat.
          # Old entries without a "build_s" field render as "—".
          echo "$last5" | jq -r '
            .[] |
            (.ts | split("T")[0] | split("-") as [$y, $m, $d] |
              ({"01":"Jan","02":"Feb","03":"Mar","04":"Apr","05":"May","06":"Jun",
                "07":"Jul","08":"Aug","09":"Sep","10":"Oct","11":"Nov","12":"Dec"}[$m])
              + " " + ($d | ltrimstr("0"))) as $date |
            (if (.build_s == null or .build_s == 0) then "—"
             else
               ((.build_s / 60 | floor) as $min |
                (.build_s % 60) as $sec |
                if $min > 0 then ($min | tostring) + "m " + ($sec | tostring) + "s"
                else ($sec | tostring) + "s" end)
             end) as $build_time |
            "| `\(.shortSha)` | \($date) | \(if .lint == null then "—" else (.lint | tostring) end) | \(if .tc == null then "—" else (.tc | tostring) end) | \(.format // 0) | \($build_time) |"
          ' >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Build sparkline strings. Null entries (skipped/cancelled jobs) are
          # omitted from the sparkline so they don't pull the trend toward zero.
          # Format entries without the field (old history) default to 0.
          lint_vals=$(echo "$last5" | jq -r '[.[].lint | select(. != null)] | map(tostring) | join(" → ")')
          tc_vals=$(echo "$last5"   | jq -r '[.[].tc   | select(. != null)] | map(tostring) | join(" → ")')
          format_vals=$(echo "$last5" | jq -r '[.[].format // 0] | map(tostring) | join(" → ")')
          # Build time sparkline: format each entry as Xm Ys; omit nulls and zeros.
          build_s_vals=$(echo "$last5" | jq -r '
            [.[] | .build_s // 0 | select(. > 0) |
              (. / 60 | floor) as $min |
              (. % 60) as $sec |
              if $min > 0 then ($min | tostring) + "m " + ($sec | tostring) + "s"
              else ($sec | tostring) + "s" end
            ] | join(" → ")
          ')

          lint_last=$(echo "$last5" | jq '.[-1].lint')
          lint_prev=$(echo "$last5" | jq '.[-2].lint')
          tc_last=$(echo "$last5"   | jq '.[-1].tc')
          tc_prev=$(echo "$last5"   | jq '.[-2].tc')
          format_last=$(echo "$last5" | jq '.[-1].format // 0')
          format_prev=$(echo "$last5" | jq '.[-2].format // 0')
          build_s_last=$(echo "$last5" | jq '.[-1].build_s // 0')
          build_s_prev=$(echo "$last5" | jq '.[-2].build_s // 0')

          lint_arrow=""
          if [ "$lint_last" != "null" ] && [ "$lint_prev" != "null" ]; then
            if   [ "$lint_last" -gt "$lint_prev" ]; then lint_arrow=" ↑"
            elif [ "$lint_last" -lt "$lint_prev" ]; then lint_arrow=" ↓"
            fi
          fi

          tc_arrow=""
          if [ "$tc_last" != "null" ] && [ "$tc_prev" != "null" ]; then
            if   [ "$tc_last" -gt "$tc_prev" ]; then tc_arrow=" ↑"
            elif [ "$tc_last" -lt "$tc_prev" ]; then tc_arrow=" ↓"
            fi
          fi

          format_arrow=""
          if   [ "$format_last" -gt "$format_prev" ]; then format_arrow=" ↑"
          elif [ "$format_last" -lt "$format_prev" ]; then format_arrow=" ↓"
          fi

          build_s_arrow=""
          if [ "$build_s_last" -gt 0 ] && [ "$build_s_prev" -gt 0 ]; then
            if   [ "$build_s_last" -gt "$build_s_prev" ]; then build_s_arrow=" ↑"
            elif [ "$build_s_last" -lt "$build_s_prev" ]; then build_s_arrow=" ↓"
            fi
          fi

          {
            echo "Lint: \`${lint_vals}${lint_arrow}\`  ·  TS: \`${tc_vals}${tc_arrow}\`  ·  Format: \`${format_vals}${format_arrow}\`  ·  Build: \`${build_s_vals}${build_s_arrow}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # Per-job build time breakdown scoped to the same last-5 entries shown
          # in the main trend table. Only rendered when at least one of those
          # entries has per-job fields; old entries without them are skipped.
          has_breakdown=$(echo "$last5" | jq '[.[] | select(.lint_s != null)] | length')
          if [ "$has_breakdown" -gt 0 ]; then
            {
              echo "<details><summary>⏱️ Per-job build time breakdown</summary>"
              echo ""
              echo "| SHA | Lint | TC | Fmt | Build |"
              echo "|-----|------|----|-----|-------|"
            } >> "$GITHUB_STEP_SUMMARY"

            echo "$last5" | jq -r '
              .[] |
              select(.lint_s != null) |
              def fmt(s):
                if s == null then "—"
                elif s == 0 then "0s"
                else
                  (s / 60 | floor) as $min |
                  (s % 60) as $sec |
                  if $min > 0 then ($min | tostring) + "m " + ($sec | tostring) + "s"
                  else ($sec | tostring) + "s" end
                end;
              "| `\(.shortSha)` | \(fmt(.lint_s)) | \(fmt(.tc_s)) | \(fmt(.format_s)) | \(fmt(.build_job_s)) |"
            ' >> "$GITHUB_STEP_SUMMARY"

            {
              echo ""
              echo "</details>"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload warn-history artifact
        uses: actions/upload-artifact@v4
        with:
          name: warn-history
          path: /tmp/warn-history/warn-history.json
          retention-days: 90

      - name: Upload time-counts artifact
        uses: actions/upload-artifact@v4
        with:
          name: time-counts
          path: /tmp/time-counts.json
          retention-days: 90

  build-time-gate:
    name: Build time gate
    runs-on: ubuntu-latest
    needs: [record-warn-history]
    # Informational only — never hard-blocks a merge. Runs on push events and
    # non-fork PRs. Fork PRs are skipped (no write token for artifact access).
    # continue-on-error keeps transient failures from blocking the run.
    if: always() && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false))
    continue-on-error: true
    outputs:
      spike: ${{ steps.compare.outputs.spike }}
      increase_pct: ${{ steps.compare.outputs.increase_pct }}
      current_fmt: ${{ steps.compare.outputs.current_fmt }}
      avg_fmt: ${{ steps.compare.outputs.avg_fmt }}
    steps:
      - name: Download current-run job timing artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/job-counts
          for artifact in lint-counts tc-counts format-counts build-counts; do
            gh run download "${{ github.run_id }}" \
              --repo "${{ github.repository }}" \
              --name "$artifact" \
              --dir "/tmp/job-counts/${artifact}" 2>/dev/null || true
          done

      - name: Download base-branch warn-history-base
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_run_id="${{ github.run_id }}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # For PRs: compare against the most recent push run on the base branch.
            base_branch="${{ github.event.pull_request.base.ref }}"
            run_id=$(gh run list \
              --repo "${{ github.repository }}" \
              --branch "$base_branch" \
              --workflow "ci.yml" \
              --limit 10 \
              --json databaseId \
              --jq '.[0].databaseId' 2>/dev/null || true)
          else
            # For push: compare against the previous run on the same branch,
            # skipping the current run which hasn't written its base history yet.
            run_id=$(gh run list \
              --repo "${{ github.repository }}" \
              --branch "$GITHUB_REF_NAME" \
              --workflow "ci.yml" \
              --limit 10 \
              --json databaseId \
              --jq "[.[] | select(.databaseId != ${current_run_id})] | .[0].databaseId" \
              2>/dev/null || true)
          fi

          mkdir -p /tmp/warn-history-base
          echo "[]" > /tmp/warn-history-base/warn-history-base.json

          if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
            gh run download "$run_id" \
              --repo "${{ github.repository }}" \
              --name warn-history-base \
              --dir /tmp/warn-history-base 2>/dev/null || true
          fi

      - name: Compare build time against base-branch average
        id: compare
        env:
          MAX_BUILD_TIME_INCREASE_PCT: ${{ vars.MAX_BUILD_TIME_INCREASE_PCT }}
        run: |
          # Compute current run's total build time (lint + tc + format + build seconds).
          lint_s=$(jq -r '.duration_s // 0' /tmp/job-counts/lint-counts/lint-counts.json 2>/dev/null || echo "0")
          tc_s=$(jq -r '.duration_s // 0' /tmp/job-counts/tc-counts/tc-counts.json 2>/dev/null || echo "0")
          format_s=$(jq -r '.duration_s // 0' /tmp/job-counts/format-counts/format-counts.json 2>/dev/null || echo "0")
          build_s=$(jq -r '.duration_s // 0' /tmp/job-counts/build-counts/build-counts.json 2>/dev/null || echo "0")
          current_build_s=$((lint_s + tc_s + format_s + build_s))

          # Use configurable threshold with a default of 25%.
          threshold_pct="${MAX_BUILD_TIME_INCREASE_PCT:-25}"

          # Validate threshold is a positive integer; fall back to 25 on bad input.
          if ! echo "$threshold_pct" | grep -qE '^[0-9]+$' || [ "$threshold_pct" -le 0 ]; then
            echo "::warning::MAX_BUILD_TIME_INCREASE_PCT='${threshold_pct}' is not a positive integer — using default 25%."
            threshold_pct=25
          fi

          echo "Current run build time: ${current_build_s}s (lint=${lint_s}s tc=${tc_s}s format=${format_s}s build=${build_s}s)"
          echo "Threshold: ${threshold_pct}%"

          # Compute average build_s from base-branch warn-history-base entries
          # that have build_s > 0. Old entries without the field are skipped
          # gracefully (select filters them out).
          avg_build_s=$(jq '
            [.[] | select(.build_s != null and .build_s > 0) | .build_s] |
            if length == 0 then 0
            else (add / length | round) end
          ' /tmp/warn-history-base/warn-history-base.json 2>/dev/null || echo "0")

          if [ -z "$avg_build_s" ] || [ "$avg_build_s" = "null" ]; then
            avg_build_s=0
          fi

          echo "Base-branch average build time: ${avg_build_s}s"

          if [ "$avg_build_s" -le 0 ]; then
            echo "No base-branch build time history available — skipping comparison."
            {
              echo "## ℹ️ Build time gate: no base history"
              echo ""
              echo "No \`build_s\` entries found in \`warn-history-base\`."
              echo "Comparison will be available after the base branch accumulates build history."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "spike=false" >> "$GITHUB_OUTPUT"
            echo "avg_s=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Calculate the allowed maximum: avg * (1 + threshold_pct / 100).
          allowed_max_s=$(( avg_build_s * (100 + threshold_pct) / 100 ))
          increase_pct=$(( (current_build_s - avg_build_s) * 100 / avg_build_s ))

          fmt_time() {
            local s=$1
            local min=$(( s / 60 ))
            local sec=$(( s % 60 ))
            if [ "$min" -gt 0 ]; then echo "${min}m ${sec}s"; else echo "${sec}s"; fi
          }
          current_fmt=$(fmt_time "$current_build_s")
          avg_fmt=$(fmt_time "$avg_build_s")
          allowed_fmt=$(fmt_time "$allowed_max_s")

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            run_label="This PR"
          else
            run_label="This push"
          fi

          {
            echo "## 🕐 Build time gate"
            echo ""
            echo "| | Time |"
            echo "|---|---|"
            echo "| Base-branch average | ${avg_fmt} |"
            echo "| ${run_label} | ${current_fmt} |"
            echo "| Allowed max (+${threshold_pct}%) | ${allowed_fmt} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$current_build_s" -gt "$allowed_max_s" ]; then
            over_s=$(( current_build_s - allowed_max_s ))
            {
              echo "| **Status** | ❌ Exceeded by ${over_s}s (${increase_pct}% over base average) |"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Build time spike: ${current_fmt} is ${increase_pct}% above the base-branch average of ${avg_fmt} (threshold: ${threshold_pct}%). Review recent changes for unexpected build slowdowns."
            echo "Build time increased by ${increase_pct}% (${avg_fmt} → ${current_fmt}), exceeding the ${threshold_pct}% threshold (allowed max: ${allowed_fmt})."
            {
              echo "spike=true"
              echo "current_s=${current_build_s}"
              echo "avg_s=${avg_build_s}"
              echo "threshold_pct=${threshold_pct}"
              echo "increase_pct=${increase_pct}"
              echo "over_s=${over_s}"
              echo "current_fmt=${current_fmt}"
              echo "avg_fmt=${avg_fmt}"
              echo "allowed_fmt=${allowed_fmt}"
            } >> "$GITHUB_OUTPUT"
            exit 1
          else
            if [ "$current_build_s" -le "$avg_build_s" ]; then
              status_line="✅ On par or faster than base average"
            else
              status_line="✅ Within threshold (+${increase_pct}%)"
            fi
            {
              echo "| **Status** | ${status_line} |"
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
            echo "Build time is within the ${threshold_pct}% threshold (${avg_fmt} → ${current_fmt})."
            {
              echo "spike=false"
              echo "current_s=${current_build_s}"
              echo "avg_s=${avg_build_s}"
              echo "threshold_pct=${threshold_pct}"
              echo "increase_pct=${increase_pct}"
              echo "current_fmt=${current_fmt}"
              echo "avg_fmt=${avg_fmt}"
              echo "allowed_fmt=${allowed_fmt}"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Post build time spike comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          SPIKE: ${{ steps.compare.outputs.spike }}
          AVG_S: ${{ steps.compare.outputs.avg_s }}
          THRESHOLD_PCT: ${{ steps.compare.outputs.threshold_pct }}
          INCREASE_PCT: ${{ steps.compare.outputs.increase_pct }}
          OVER_S: ${{ steps.compare.outputs.over_s }}
          CURRENT_FMT: ${{ steps.compare.outputs.current_fmt }}
          AVG_FMT: ${{ steps.compare.outputs.avg_fmt }}
          ALLOWED_FMT: ${{ steps.compare.outputs.allowed_fmt }}
          RUN_ID: ${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- CI-BUILD-TIME-GATE -->';
            const runIdPrefix = '<!-- CI-BUILD-TIME-RUN:';
            const currentRunId = parseInt(process.env.RUN_ID, 10);
            const spike = process.env.SPIKE === 'true';
            const avgS = parseInt(process.env.AVG_S || '0', 10);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            // Extract the run ID embedded in an existing comment, if present.
            function extractRunId(body) {
              const match = body && body.match(/<!-- CI-BUILD-TIME-RUN:(\d+) -->/);
              return match ? parseInt(match[1], 10) : 0;
            }

            if (!spike || avgS <= 0) {
              // No spike (or no base history) — delete any stale comment,
              // but only if it belongs to an older run than ours.
              if (existing) {
                const existingRunId = extractRunId(existing.body);
                if (existingRunId > currentRunId) {
                  // A newer run already owns this comment; leave it alone.
                  return;
                }
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              return;
            }

            // If an existing comment belongs to a newer run, skip — that run's
            // data is fresher and we must not overwrite or duplicate it.
            if (existing) {
              const existingRunId = extractRunId(existing.body);
              if (existingRunId > currentRunId) {
                return;
              }
            }

            const thresholdPct = process.env.THRESHOLD_PCT;
            const body = [
              marker,
              `${runIdPrefix}${currentRunId} -->`,
              '## ⚠️ Build time spike detected',
              '',
              '| | Time |',
              '|---|---|',
              `| Base-branch average | ${process.env.AVG_FMT} |`,
              `| This PR | ${process.env.CURRENT_FMT} |`,
              `| Allowed max (+${thresholdPct}%) | ${process.env.ALLOWED_FMT} |`,
              `| **Status** | **❌ +${process.env.INCREASE_PCT}% (${process.env.OVER_S}s over limit)** |`,
              '',
              `Build time increased by **${process.env.INCREASE_PCT}%** above the base-branch average,`,
              `exceeding the ${thresholdPct}% threshold. Review recent changes for unexpected build slowdowns.`,
              '',
              `_Last updated by run [#${currentRunId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${currentRunId})._`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  record-warn-history-base:
    name: Record base branch warning history
    runs-on: ubuntu-latest
    needs: [lint, typecheck, format, build]
    # Records a rolling warn-history-base artifact on every push (base branch
    # merges). Skipped for pull_request events — those are tracked by
    # record-warn-history instead.
    # continue-on-error keeps transient GitHub API failures non-fatal.
    if: always() && github.event_name == 'push'
    continue-on-error: true
    steps:
      - name: Download previous warn-history-base artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_branch="${GITHUB_REF_NAME}"
          current_run_id="${{ github.run_id }}"

          prev_run_id=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch "$current_branch" \
            --workflow "ci.yml" \
            --limit 10 \
            --json databaseId \
            --jq "[.[] | select(.databaseId != ${current_run_id})] | .[0].databaseId" \
            2>/dev/null || true)

          mkdir -p /tmp/warn-history-base

          if [ -n "$prev_run_id" ] && [ "$prev_run_id" != "null" ]; then
            gh run download "$prev_run_id" \
              --repo "${{ github.repository }}" \
              --name warn-history-base \
              --dir /tmp/warn-history-base 2>/dev/null || true
          fi

          if [ ! -f /tmp/warn-history-base/warn-history-base.json ]; then
            echo "[]" > /tmp/warn-history-base/warn-history-base.json
          fi

      - name: Download job timing artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/job-counts
          for artifact in lint-counts tc-counts format-counts build-counts; do
            gh run download "${{ github.run_id }}" \
              --repo "${{ github.repository }}" \
              --name "$artifact" \
              --dir "/tmp/job-counts/${artifact}" 2>/dev/null || true
          done

      - name: Append current counts and cap history
        env:
          LINT_WARNINGS: ${{ needs.lint.outputs.lint_warning_count }}
          TC_WARNINGS: ${{ needs.typecheck.outputs.tc_warning_count }}
          FORMAT_ERRORS: ${{ needs.format.outputs.format_error_count }}
        run: |
          # Use null (JSON null) when a job was skipped/cancelled so we don't
          # silently record 0 and distort the trend sparkline downward.
          lint_w="${LINT_WARNINGS}"
          tc_w="${TC_WARNINGS}"
          format_e="${FORMAT_ERRORS}"
          [ -z "$lint_w" ]   && lint_json="null"   || lint_json="$lint_w"
          [ -z "$tc_w" ]     && tc_json="null"     || tc_json="$tc_w"
          [ -z "$format_e" ] && format_json="null" || format_json="$format_e"
          sha="${GITHUB_SHA}"
          short_sha="${sha:0:7}"
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Read per-job durations and compute total compile/check work seconds.
          lint_s=$(jq -r '.duration_s // 0' /tmp/job-counts/lint-counts/lint-counts.json 2>/dev/null || echo "0")
          tc_s=$(jq -r '.duration_s // 0' /tmp/job-counts/tc-counts/tc-counts.json 2>/dev/null || echo "0")
          format_s=$(jq -r '.duration_s // 0' /tmp/job-counts/format-counts/format-counts.json 2>/dev/null || echo "0")
          build_s=$(jq -r '.duration_s // 0' /tmp/job-counts/build-counts/build-counts.json 2>/dev/null || echo "0")
          total_build_s=$((lint_s + tc_s + format_s + build_s))

          history=$(cat /tmp/warn-history-base/warn-history-base.json)
          # build_s  = total (lint + tc + format + build step) — kept for backward
          #            compat with build-time-gate which reads this field.
          # build_job_s = only the build step; distinguishes from the total.
          new_entry="{\"sha\":\"${sha}\",\"shortSha\":\"${short_sha}\",\"ts\":\"${ts}\",\"lint\":${lint_json},\"tc\":${tc_json},\"format\":${format_json},\"lint_s\":${lint_s},\"tc_s\":${tc_s},\"format_s\":${format_s},\"build_job_s\":${build_s},\"build_s\":${total_build_s}}"
          # Append new entry and keep only the last 20 to avoid unbounded growth.
          updated=$(printf '%s\n' "$history" | jq --argjson entry "$new_entry" '. + [$entry] | .[-20:]')
          echo "$updated" > /tmp/warn-history-base/warn-history-base.json

      - name: Upload warn-history-base artifact
        uses: actions/upload-artifact@v4
        with:
          name: warn-history-base
          path: /tmp/warn-history-base/warn-history-base.json
          retention-days: 90

  build-dashboard:
    name: Build CI dashboard
    runs-on: ubuntu-latest
    needs: [record-warn-history]
    # Informational only — always runs so maintainers have a dashboard even on
    # failing builds. Skipped for fork PRs (no write token to download artifacts).
    # continue-on-error keeps transient GitHub API failures non-fatal.
    if: always() && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false))
    continue-on-error: true
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download warn-history artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/warn-history
          gh run download "${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            --name warn-history \
            --dir /tmp/warn-history 2>/dev/null || true
          if [ ! -f /tmp/warn-history/warn-history.json ]; then
            echo "[]" > /tmp/warn-history/warn-history.json
          fi

      - uses: actions/checkout@v4

      - name: Generate CI dashboard HTML
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node .github/scripts/gen-dashboard.js

      - name: Upload CI dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-dashboard
          path: ci-dashboard.html
          retention-days: 90

      - name: Deploy dashboard to GitHub Pages
        # Only publish on default-branch pushes so feature-branch or PR data
        # never overwrites the canonical live dashboard. Fork PRs are already
        # excluded by the job-level `if`.
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch the gh-pages branch if it already exists.
          git fetch origin gh-pages 2>/dev/null || true

          # Set up an isolated worktree so we don't disturb the main checkout.
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            # First-time: create an orphan branch with no history.
            git worktree add --orphan -b gh-pages /tmp/gh-pages
          fi

          # Always update the canonical latest copy.
          cp ci-dashboard.html /tmp/gh-pages/ci-dashboard.html

          # Derive a dated slug: YYYYMMDD-<short-sha>
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE_STR=$(date -u +%Y%m%d)
          SLUG="${DATE_STR}-${SHORT_SHA}"

          # Write the dated archive copy.
          mkdir -p /tmp/gh-pages/runs
          cp ci-dashboard.html "/tmp/gh-pages/runs/${SLUG}.html"

          # Update runs/manifest.json — add this run, cap at 30, prune old files.
          export SLUG SHORT_SHA DATE_STR RUN_URL
          node - <<'JSEOF'
          const fs = require('fs');
          const manifest = '/tmp/gh-pages/runs/manifest.json';
          let existing = [];
          try { existing = JSON.parse(fs.readFileSync(manifest, 'utf8')); } catch {}
          const newEntry = {
            slug: process.env.SLUG,
            sha: process.env.SHORT_SHA,
            date: process.env.DATE_STR,
            runUrl: process.env.RUN_URL,
          };
          // Deduplicate by slug (re-runs of the same SHA overwrite).
          const updated = [newEntry, ...existing.filter(e => e.slug !== newEntry.slug)];
          const cap = 30;
          const removed = updated.slice(cap);
          const kept = updated.slice(0, cap);
          // Delete HTML files for evicted entries.
          removed.forEach(e => {
            try { fs.unlinkSync('/tmp/gh-pages/runs/' + e.slug + '.html'); } catch {}
          });
          fs.writeFileSync(manifest, JSON.stringify(kept, null, 2));
          JSEOF

          # Regenerate the archive index page.
          node .github/scripts/gen-index.js \
            /tmp/gh-pages/runs/manifest.json \
            /tmp/gh-pages/index.html

          cd /tmp/gh-pages
          git add ci-dashboard.html "runs/${SLUG}.html" runs/manifest.json index.html
          # Stage any HTML files that were removed by the cap.
          git add -u runs/ 2>/dev/null || true

          # Skip the push when nothing changed (e.g. a rerun with identical history).
          if git diff --cached --quiet; then
            echo "Dashboard unchanged — skipping commit."
            exit 0
          fi

          git commit -m "chore: archive CI dashboard ${SLUG} [skip ci]"
          git push origin HEAD:gh-pages

      - name: Link dashboard from job summary
        run: |
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          branch="${{ github.head_ref || github.ref_name }}"
          entry_count=$(jq 'length' /tmp/warn-history/warn-history.json 2>/dev/null || echo "0")
          event_name="${{ github.event_name }}"
          git_ref="${{ github.ref }}"
          default_branch="${{ github.event.repository.default_branch }}"
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          repo_name=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          pages_base="https://${owner_lc}.github.io/${repo_name}"
          pages_url="${pages_base}/ci-dashboard.html"
          archive_url="${pages_base}/index.html"
          is_default_push=false
          if [ "$event_name" = "push" ] && [ "$git_ref" = "refs/heads/${default_branch}" ]; then
            is_default_push=true
          fi
          {
            echo "## 📊 CI Dashboard"
            echo ""
            echo "It shows build time alongside lint and TypeScript warning counts across the last ${entry_count} run(s) on \`${branch}\`."
            echo ""
            if [ "$is_default_push" = "true" ]; then
              echo "**Live dashboard:** [${pages_url}](${pages_url}) *(GitHub Pages — updated by this run)*"
              echo ""
              echo "**Archive index:** [${archive_url}](${archive_url}) *(all archived runs, newest first)*"
              echo ""
              echo "**This run's artifact:** [ci-dashboard artifact](${run_url}#artifacts)"
            else
              echo "**Download:** [ci-dashboard artifact](${run_url}#artifacts) *(available on the Artifacts section of this run page)*"
              echo ""
              echo "Live dashboard (default branch): [${pages_url}](${pages_url})"
              echo ""
              echo "Archive index (default branch): [${archive_url}](${archive_url})"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  report:
    name: Post CI summary comment
    runs-on: ubuntu-latest
    needs: [format, lint, typecheck, record-warn-history, build-time-gate]
    if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    steps:
      - name: Download previous-push warning counts
        id: prev-counts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          head_ref="${{ github.head_ref }}"
          current_run_id="${{ github.run_id }}"

          # Find the most recent CI run on this PR's head branch that is not
          # the current run. Any completion status is acceptable — we just want
          # the most recent set of counts to compute a delta.
          prev_run_id=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch "$head_ref" \
            --workflow "ci.yml" \
            --limit 10 \
            --json databaseId \
            --jq "[.[] | select(.databaseId != ${current_run_id})] | .[0].databaseId" \
            2>/dev/null || true)

          if [ -z "$prev_run_id" ] || [ "$prev_run_id" = "null" ]; then
            echo "No previous run found for branch '${head_ref}'. Skipping delta."
            echo "prev_lint_warnings=" >> "$GITHUB_OUTPUT"
            echo "prev_tc_warnings=" >> "$GITHUB_OUTPUT"
            echo "prev_format_warnings=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p /tmp/prev-counts/lint /tmp/prev-counts/tc /tmp/prev-counts/format

          if gh run download "$prev_run_id" \
              --repo "${{ github.repository }}" \
              --name lint-counts \
              --dir /tmp/prev-counts/lint 2>/dev/null; then
            prev_lint=$(jq -r '.warnings' /tmp/prev-counts/lint/lint-counts.json 2>/dev/null || echo "")
          else
            prev_lint=""
          fi

          if gh run download "$prev_run_id" \
              --repo "${{ github.repository }}" \
              --name tc-counts \
              --dir /tmp/prev-counts/tc 2>/dev/null; then
            prev_tc=$(jq -r '.warnings' /tmp/prev-counts/tc/tc-counts.json 2>/dev/null || echo "")
          else
            prev_tc=""
          fi

          if gh run download "$prev_run_id" \
              --repo "${{ github.repository }}" \
              --name format-counts \
              --dir /tmp/prev-counts/format 2>/dev/null; then
            prev_format=$(jq -r '.errors' /tmp/prev-counts/format/format-counts.json 2>/dev/null || echo "")
          else
            prev_format=""
          fi

          echo "prev_lint_warnings=${prev_lint}" >> "$GITHUB_OUTPUT"
          echo "prev_tc_warnings=${prev_tc}" >> "$GITHUB_OUTPUT"
          echo "prev_format_warnings=${prev_format}" >> "$GITHUB_OUTPUT"

      - name: Download warn-history artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/warn-history
          gh run download "${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            --name warn-history \
            --dir /tmp/warn-history 2>/dev/null || true

      - name: Post or update unified CI comment
        uses: actions/github-script@v7
        env:
          FORMAT_RESULT: ${{ needs.format.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TC_RESULT: ${{ needs.typecheck.result }}
          LINT_OUTPUT: ${{ needs.lint.outputs.lint_output }}
          LINT_ERROR_COUNT: ${{ needs.lint.outputs.lint_error_count }}
          LINT_WARNING_COUNT: ${{ needs.lint.outputs.lint_warning_count }}
          TC_OUTPUT: ${{ needs.typecheck.outputs.tc_output }}
          TC_ERROR_COUNT: ${{ needs.typecheck.outputs.tc_error_count }}
          TC_WARNING_COUNT: ${{ needs.typecheck.outputs.tc_warning_count }}
          PREV_LINT_WARNINGS: ${{ steps.prev-counts.outputs.prev_lint_warnings }}
          PREV_TC_WARNINGS: ${{ steps.prev-counts.outputs.prev_tc_warnings }}
          PREV_FORMAT_WARNINGS: ${{ steps.prev-counts.outputs.prev_format_warnings }}
          FORMAT_ERROR_COUNT: ${{ needs.format.outputs.format_error_count }}
          BUILD_TIME_SPIKE: ${{ needs.build-time-gate.outputs.spike }}
          BUILD_TIME_INCREASE_PCT: ${{ needs.build-time-gate.outputs.increase_pct }}
          BUILD_TIME_CURRENT_FMT: ${{ needs.build-time-gate.outputs.current_fmt }}
          BUILD_TIME_AVG_FMT: ${{ needs.build-time-gate.outputs.avg_fmt }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- CI-BOT -->';

            const formatResult = process.env.FORMAT_RESULT;
            const lintResult = process.env.LINT_RESULT;
            const tcResult = process.env.TC_RESULT;
            const lintOutput = process.env.LINT_OUTPUT || '';
            const lintErrorCount = parseInt(process.env.LINT_ERROR_COUNT || '0', 10);
            const lintWarningCount = parseInt(process.env.LINT_WARNING_COUNT || '0', 10);
            const tcOutput = process.env.TC_OUTPUT || '';
            const tcErrorCount = parseInt(process.env.TC_ERROR_COUNT || '0', 10);
            const tcWarningCount = parseInt(process.env.TC_WARNING_COUNT || '0', 10);
            const formatErrorCount = parseInt(process.env.FORMAT_ERROR_COUNT || '0', 10);
            const buildTimeSpike = process.env.BUILD_TIME_SPIKE === 'true';
            const buildTimeIncreasePct = process.env.BUILD_TIME_INCREASE_PCT || '';
            const buildTimeCurrentFmt = process.env.BUILD_TIME_CURRENT_FMT || '';
            const buildTimeAvgFmt = process.env.BUILD_TIME_AVG_FMT || '';

            // Load rolling warn-history written by the record-warn-history job.
            let warnHistory = [];
            try {
              const histPath = '/tmp/warn-history/warn-history.json';
              if (fs.existsSync(histPath)) {
                warnHistory = JSON.parse(fs.readFileSync(histPath, 'utf8'));
              }
            } catch (e) {
              core.info(`Could not read warn-history: ${e.message}`);
            }

            // Build a compact trend section showing the last 5 pushes on this
            // branch as a Markdown table plus a text sparkline for each check.
            // Returns an empty array when there is not enough history to be useful.
            // Old entries without a "format" field are treated as 0.
            function buildTrendSection(hist) {
              if (hist.length < 2) return [];
              const last5 = hist.slice(-5);
              const currentSha = context.sha;

              // Null values come from skipped/cancelled jobs. Omit them from the
              // sparkline so they don't pull the trend toward zero; compare only
              // the last two non-null values for the direction arrow.
              function sparkline(values) {
                const nonNull = values.filter((v) => v !== null);
                if (nonNull.length === 0) return '—';
                if (nonNull.length === 1) return String(nonNull[0]);
                const last = nonNull[nonNull.length - 1];
                const prev = nonNull[nonNull.length - 2];
                const arrow = last > prev ? ' ↑' : last < prev ? ' ↓' : '';
                return nonNull.map(String).join(' → ') + arrow;
              }

              const rows = last5.map((entry) => {
                const date = new Date(entry.ts).toLocaleDateString('en-US', {
                  month: 'short', day: 'numeric', timeZone: 'UTC',
                });
                const isCurrent = entry.sha === currentSha;
                const shaLabel = isCurrent
                  ? `\`${entry.shortSha}\` *(now)*`
                  : `\`${entry.shortSha}\``;
                const lintCell = entry.lint === null ? '—' : entry.lint;
                const tcCell = entry.tc === null ? '—' : entry.tc;
                // Old entries without format field (undefined) default to 0;
                // null means the format job was skipped/cancelled.
                const formatCount = entry.format === undefined ? 0 : (entry.format === null ? '—' : entry.format);
                // Old entries without build_s field (undefined or null) render as "—".
                const buildS = entry.build_s;
                let buildTime = '—';
                if (buildS != null && buildS > 0) {
                  const min = Math.floor(buildS / 60);
                  const sec = buildS % 60;
                  buildTime = min > 0 ? `${min}m ${sec}s` : `${sec}s`;
                }
                return `| ${shaLabel} | ${date} | ${lintCell} | ${tcCell} | ${formatCount} | ${buildTime} |`;
              });

              const lintLine = sparkline(last5.map((e) => e.lint));
              const tcLine = sparkline(last5.map((e) => e.tc));
              // Old entries without a format field (undefined) are treated as 0;
              // null (skipped job) is kept as null so the sparkline filters it out.
              const formatLine = sparkline(last5.map((e) => e.format === undefined ? 0 : e.format));
              // Build time sparkline: format each entry as "Xm Ys"; compare raw seconds.
              const buildLine = (() => {
                const vals = last5.map((e) => (e.build_s != null && e.build_s > 0) ? e.build_s : null);
                const nonNull = vals.filter((v) => v !== null);
                if (nonNull.length === 0) return '—';
                const last = nonNull[nonNull.length - 1];
                const prev = nonNull.length > 1 ? nonNull[nonNull.length - 2] : null;
                const arrow = prev != null ? (last > prev ? ' ↑' : last < prev ? ' ↓' : '') : '';
                const fmt = (s) => {
                  const min = Math.floor(s / 60);
                  const sec = s % 60;
                  return min > 0 ? `${min}m ${sec}s` : `${sec}s`;
                };
                return nonNull.map(fmt).join(' → ') + arrow;
              })();
              const n = last5.length;

              // Per-job breakdown: only include rows for entries that have the
              // per-job fields (lint_s, tc_s, format_s, build_job_s). Old entries
              // without these fields are silently skipped (backward compat).
              const fmtTime = (s) => {
                if (s == null) return '—';
                if (s === 0) return '0s';
                const min = Math.floor(s / 60);
                const sec = s % 60;
                return min > 0 ? `${min}m ${sec}s` : `${sec}s`;
              };
              const breakdownEntries = last5.filter((e) => e.lint_s != null);
              const breakdownRows = breakdownEntries.map((e) => {
                const isCurrent = e.sha === currentSha;
                const shaLabel = isCurrent
                  ? `\`${e.shortSha}\` *(now)*`
                  : `\`${e.shortSha}\``;
                return `| ${shaLabel} | ${fmtTime(e.lint_s)} | ${fmtTime(e.tc_s)} | ${fmtTime(e.format_s)} | ${fmtTime(e.build_job_s)} |`;
              });
              const breakdownSection = breakdownRows.length > 0 ? [
                '',
                '<details><summary>⏱️ Per-job build time breakdown</summary>',
                '',
                '| SHA | Lint | TC | Fmt | Build |',
                '|-----|------|----|-----|-------|',
                ...breakdownRows,
                '',
                '</details>',
              ] : [];

              return [
                '',
                `<details><summary>📈 Warning trend (last ${n} push${n !== 1 ? 'es' : ''} on this branch)</summary>`,
                '',
                '| SHA | Date | Lint ⚠️ | TS ⚠️ | Format errors | Build time |',
                '|-----|------|---------|-------|---------------|------------|',
                ...rows,
                '',
                `Lint: \`${lintLine}\`  ·  TS: \`${tcLine}\`  ·  Format: \`${formatLine}\`  ·  Build: \`${buildLine}\``,
                ...breakdownSection,
                '',
                '</details>',
              ];
            }

            const trendSection = buildTrendSection(warnHistory);

            // Build per-check delta lines for the comment when previous counts
            // are available. Returns null when there is no prior data.
            function deltaLine(current, prevRaw, label, metricNoun = 'warning') {
              const prev = parseInt(prevRaw || '', 10);
              if (!prevRaw || isNaN(prev)) return null;
              const delta = current - prev;
              const n = Math.abs(delta);
              const noun = `${label} ${metricNoun}${n !== 1 ? 's' : ''}`;
              if (delta > 0) return `⬆️ +${delta} ${noun} since last push`;
              if (delta < 0) return `⬇️ −${n} ${noun} since last push`;
              return `➡️ ${noun} unchanged since last push`;
            }

            const lintDelta = deltaLine(lintWarningCount, process.env.PREV_LINT_WARNINGS, 'lint');
            const tcDelta = deltaLine(tcWarningCount, process.env.PREV_TC_WARNINGS, 'typecheck');
            const formatDelta = formatErrorCount > 0
              ? deltaLine(formatErrorCount, process.env.PREV_FORMAT_WARNINGS, 'format', 'error')
              : null;
            // Include a build-time delta line only when a spike is detected, so
            // the comment stays clean on normal (within-threshold) builds.
            const buildTimeDelta = buildTimeSpike && buildTimeIncreasePct
              ? `⬆️ Build time +${buildTimeIncreasePct}% vs base average (${buildTimeCurrentFmt} vs avg ${buildTimeAvgFmt})`
              : null;
            const deltaLines = [lintDelta, tcDelta, formatDelta, buildTimeDelta].filter(Boolean);

            const failed = [formatResult, lintResult, tcResult].some(
              (r) => r === 'failure',
            );

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (!failed) {
              // All checks passed — post (or update) a success comment so
              // warning counts stay visible to reviewers even on green builds.
              const hasWarnings = lintWarningCount > 0 || tcWarningCount > 0;
              const warningLines = [];
              if (hasWarnings) {
                warningLines.push(
                  '',
                  '<details><summary>⚠️ Warning counts</summary>',
                  '',
                  '| Check | Warnings |',
                  '|-------|----------|',
                );
                if (lintWarningCount > 0) {
                  warningLines.push(`| Lint (ESLint) | ${lintWarningCount} |`);
                }
                if (tcWarningCount > 0) {
                  warningLines.push(`| Typecheck (TypeScript) | ${tcWarningCount} |`);
                }
                warningLines.push('', '</details>');
              }
              const deltaSection = deltaLines.length > 0
                ? ['', ...deltaLines]
                : [];
              const successHeader = buildTimeSpike
                ? '## ✅ All checks passed · ⏱️ Build time spike'
                : '## ✅ All checks passed';
              const successBody = [
                marker,
                successHeader,
                ...deltaSection,
                ...trendSection,
                ...warningLines,
              ].join('\n');
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: successBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: successBody,
                });
              }
              return;
            }

            const sections = [];

            if (formatResult === 'failure') {
              sections.push([
                '### \u274c Formatting (Prettier)',
                '',
                'One or more files are not formatted. Fix locally with:',
                '',
                '```sh',
                'pnpm run format && git commit -a --amend --no-edit',
                '```',
                '',
                'Then push again.',
              ].join('\n'));
            }

            if (lintResult === 'failure') {
              const lintCountLine = `**${lintErrorCount} error(s), ${lintWarningCount} warning(s)**`;
              const lintSection = [
                '### \u274c Lint (ESLint)',
                '',
                `${lintCountLine} — fix them locally with:`,
                '',
                '```sh',
                'pnpm run lint',
                '```',
              ];
              if (lintOutput) {
                lintSection.push(
                  '',
                  '<details><summary>Full lint output</summary>',
                  '',
                  '```',
                  lintOutput,
                  '```',
                  '',
                  '</details>',
                );
              }
              sections.push(lintSection.join('\n'));
            }

            if (tcResult === 'failure') {
              const tcCountLine = `**${tcErrorCount} error(s), ${tcWarningCount} warning(s)**`;
              const tcSection = [
                '### \u274c Typecheck (TypeScript)',
                '',
                `${tcCountLine} — fix them locally with:`,
                '',
                '```sh',
                'pnpm run typecheck',
                '```',
              ];
              if (tcOutput) {
                tcSection.push(
                  '',
                  '<details><summary>Full typecheck output</summary>',
                  '',
                  '```',
                  tcOutput,
                  '```',
                  '',
                  '</details>',
                );
              }
              sections.push(tcSection.join('\n'));
            }

            const failedNames = [
              formatResult === 'failure' ? 'Formatting' : null,
              lintResult === 'failure' ? 'Lint' : null,
              tcResult === 'failure' ? 'Typecheck' : null,
            ]
              .filter(Boolean)
              .join(', ');

            const failureDeltaSection = deltaLines.length > 0
              ? ['', ...deltaLines, '']
              : [''];
            const failureHeader = buildTimeSpike
              ? `## \u274c CI failed \u2014 ${failedNames} · ⏱️ Build time spike`
              : `## \u274c CI failed \u2014 ${failedNames}`;
            const body = [
              marker,
              failureHeader,
              ...failureDeltaSection,
              ...trendSection,
              ...(trendSection.length > 0 ? [''] : []),
              sections.join('\n\n---\n\n'),
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  warn-trend:
    name: Warning trend (PR)
    runs-on: ubuntu-latest
    needs: lint
    # Informational only — runs even when lint fails so we can still track counts.
    # Skipped for push events and fork PRs (no write token).
    # continue-on-error keeps transient GitHub API failures from blocking the PR.
    if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    continue-on-error: true
    steps:
      - name: Download base-branch lint counts
        id: base-counts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          base_branch="${{ github.event.pull_request.base.ref }}"

          # Find the most recent successful CI run on the base branch and
          # download its lint-counts artifact. Failures here are non-fatal.
          run_id=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch "$base_branch" \
            --workflow "ci.yml" \
            --status success \
            --limit 5 \
            --json databaseId \
            --jq '.[0].databaseId' 2>/dev/null || true)

          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "No successful base-branch CI run found for '${base_branch}'. Skipping comparison."
            echo "base_warnings=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p /tmp/base-counts
          if gh run download "$run_id" \
              --repo "${{ github.repository }}" \
              --name lint-counts \
              --dir /tmp/base-counts 2>/dev/null; then
            base_warnings=$(jq -r '.warnings' /tmp/base-counts/lint-counts.json 2>/dev/null || echo "")
            echo "base_warnings=${base_warnings}" >> "$GITHUB_OUTPUT"
          else
            echo "Could not download lint-counts artifact from run ${run_id}."
            echo "base_warnings=" >> "$GITHUB_OUTPUT"
          fi

      - name: Download base-branch warn-history-base
        id: base-history
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          base_branch="${{ github.event.pull_request.base.ref }}"

          # Find the most recent CI run (any status) on the base branch that
          # has a warn-history-base artifact. Non-fatal if not found.
          run_id=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch "$base_branch" \
            --workflow "ci.yml" \
            --limit 10 \
            --json databaseId \
            --jq '.[0].databaseId' 2>/dev/null || true)

          mkdir -p /tmp/warn-history-base
          echo "[]" > /tmp/warn-history-base/warn-history-base.json

          if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
            gh run download "$run_id" \
              --repo "${{ github.repository }}" \
              --name warn-history-base \
              --dir /tmp/warn-history-base 2>/dev/null || true
          fi

      - name: Post warning trend comment
        uses: actions/github-script@v7
        env:
          HEAD_WARNINGS: ${{ needs.lint.outputs.lint_warning_count }}
          HEAD_ERRORS: ${{ needs.lint.outputs.lint_error_count }}
          BASE_WARNINGS: ${{ steps.base-counts.outputs.base_warnings }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          BASE_HISTORY_FILE: /tmp/warn-history-base/warn-history-base.json
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- CI-WARN-TREND -->';
            const headWarnings = parseInt(process.env.HEAD_WARNINGS || '0', 10);
            const baseWarningsRaw = process.env.BASE_WARNINGS;
            const baseBranch = process.env.BASE_BRANCH;

            // Load base branch history (last 5 entries for the sparkline table).
            let baseHistory = [];
            try {
              const raw = fs.readFileSync(process.env.BASE_HISTORY_FILE, 'utf8');
              const parsed = JSON.parse(raw);
              if (Array.isArray(parsed)) baseHistory = parsed.slice(-5);
            } catch (_) {
              // History unavailable — table section will be omitted.
            }

            // Build a compact history table (last 5 merges, oldest → newest).
            // Old entries without a "format" field are treated as 0.
            // Old entries without a "build_s" field render as "—".
            function buildHistoryTable(entries, branch) {
              if (entries.length === 0) return [];
              const header = [
                `<details><summary><strong>\`${branch}\` recent history</strong> (last ${entries.length} merge${entries.length === 1 ? '' : 's'})</summary>`,
                '',
                '| Commit | Date | Lint warnings | TS warnings | Format errors | Build time |',
                '|---|---|---|---|---|---|',
              ];
              const rows = entries.map(e => {
                const date = e.ts ? e.ts.slice(0, 10) : '—';
                const formatCount = e.format ?? 0;
                const buildS = e.build_s;
                let buildTime = '—';
                if (buildS != null && buildS > 0) {
                  const min = Math.floor(buildS / 60);
                  const sec = buildS % 60;
                  buildTime = min > 0 ? `${min}m ${sec}s` : `${sec}s`;
                }
                return `| \`${e.shortSha || e.sha.slice(0, 7)}\` | ${date} | ${e.lint} | ${e.tc} | ${formatCount} | ${buildTime} |`;
              });
              return [...header, ...rows, '', '</details>'];
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            // Guard: require a non-empty, numeric base count before doing math.
            const baseWarnings = parseInt(baseWarningsRaw || '', 10);
            if (!baseWarningsRaw || isNaN(baseWarnings)) {
              // No base data yet — clean up any stale comment and exit.
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              core.info(`No base warning count available for "${baseBranch}" — skipping trend comment.`);
              return;
            }

            const delta = headWarnings - baseWarnings;

            if (delta <= 0) {
              // Warnings unchanged or improved — remove any previous trend comment.
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                });
              }
              const msg = delta < 0
                ? `ESLint warnings decreased by ${-delta} (${baseWarnings} → ${headWarnings}). 🎉`
                : `ESLint warning count unchanged (${headWarnings} warnings).`;
              core.info(msg);
              return;
            }

            // Warnings increased — post or update an informational comment.
            const historySection = buildHistoryTable(baseHistory, baseBranch);
            const body = [
              marker,
              `## ⚠️ ESLint warnings increased`,
              '',
              `| | Warnings |`,
              `|---|---|`,
              `| Base (\`${baseBranch}\`) | ${baseWarnings} |`,
              `| This PR | ${headWarnings} |`,
              `| **Change** | **+${delta}** |`,
              '',
              'New lint warnings were introduced. The **Warning regression gate** (`warn-gate`) may block',
              'this PR depending on the `MAX_NEW_WARNINGS` threshold configured for this repository.',
              '',
              'To resolve: fix the warnings, or add the `ci: allow-warning-increase` label to bypass',
              'the gate for intentional exceptions.',
              ...(historySection.length > 0 ? ['', ...historySection] : []),
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            // Also surface a workflow-level warning annotation.
            core.warning(
              `ESLint warnings increased by ${delta} (base: ${baseWarnings}, head: ${headWarnings}). ` +
              `Review new warnings before merging.`
            );

  warn-gate:
    name: Warning regression gate (PR)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, format]
    # Runs on every PR push so new warnings are caught before merge.
    # Skipped for push events and fork PRs (no write token for label reads).
    if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    steps:
      - name: Download base-branch warning counts
        id: base-counts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          base_branch="${{ github.event.pull_request.base.ref }}"

          # Find the most recent successful CI run on the base branch.
          run_id=$(gh run list \
            --repo "${{ github.repository }}" \
            --branch "$base_branch" \
            --workflow "ci.yml" \
            --status success \
            --limit 5 \
            --json databaseId \
            --jq '.[0].databaseId' 2>/dev/null || true)

          base_lint=""
          base_tc=""
          base_format=""

          if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
            mkdir -p /tmp/base-counts/lint /tmp/base-counts/tc /tmp/base-counts/format

            if gh run download "$run_id" \
                --repo "${{ github.repository }}" \
                --name lint-counts \
                --dir /tmp/base-counts/lint 2>/dev/null; then
              base_lint=$(jq -r '.warnings' /tmp/base-counts/lint/lint-counts.json 2>/dev/null || echo "")
            fi

            if gh run download "$run_id" \
                --repo "${{ github.repository }}" \
                --name tc-counts \
                --dir /tmp/base-counts/tc 2>/dev/null; then
              base_tc=$(jq -r '.warnings' /tmp/base-counts/tc/tc-counts.json 2>/dev/null || echo "")
            fi

            if gh run download "$run_id" \
                --repo "${{ github.repository }}" \
                --name format-counts \
                --dir /tmp/base-counts/format 2>/dev/null; then
              base_format=$(jq -r '.errors' /tmp/base-counts/format/format-counts.json 2>/dev/null || echo "")
            fi
          else
            echo "No successful base-branch CI run found for '${base_branch}'. Skipping gate."
          fi

          echo "base_lint=${base_lint}" >> "$GITHUB_OUTPUT"
          echo "base_tc=${base_tc}" >> "$GITHUB_OUTPUT"
          echo "base_format=${base_format}" >> "$GITHUB_OUTPUT"

      - name: Enforce warning regression gate
        uses: actions/github-script@v7
        env:
          HEAD_LINT: ${{ needs.lint.outputs.lint_warning_count }}
          HEAD_TC: ${{ needs.typecheck.outputs.tc_warning_count }}
          HEAD_FORMAT: ${{ needs.format.outputs.format_error_count }}
          BASE_LINT: ${{ steps.base-counts.outputs.base_lint }}
          BASE_TC: ${{ steps.base-counts.outputs.base_tc }}
          BASE_FORMAT: ${{ steps.base-counts.outputs.base_format }}
          MAX_NEW_WARNINGS: ${{ vars.MAX_NEW_WARNINGS }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        with:
          script: |
            // Threshold: repo variable MAX_NEW_WARNINGS, default 0.
            // Set it to a positive integer to allow a grace margin (e.g. 2 per PR).
            const threshold = parseInt(process.env.MAX_NEW_WARNINGS || '0', 10);
            const effectiveThreshold = isNaN(threshold) ? 0 : threshold;

            const headLint   = parseInt(process.env.HEAD_LINT   || '0', 10);
            const headTc     = parseInt(process.env.HEAD_TC     || '0', 10);
            const headFormat = parseInt(process.env.HEAD_FORMAT || '0', 10);
            const baseLintRaw   = process.env.BASE_LINT;
            const baseTcRaw     = process.env.BASE_TC;
            const baseFormatRaw = process.env.BASE_FORMAT;
            const baseBranch    = process.env.BASE_BRANCH;

            // Check for bypass label — allows intentional warning introductions.
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const bypassed = pr.labels.some(l => l.name === 'ci: allow-warning-increase');
            if (bypassed) {
              core.warning(
                'Warning regression gate bypassed via "ci: allow-warning-increase" label. ' +
                'Remove the label once the warnings are addressed.'
              );
              return;
            }

            // No base data yet (first run on this base branch) — cannot gate; skip gracefully.
            if (!baseLintRaw && !baseTcRaw && !baseFormatRaw) {
              core.info(`No base warning counts found for "${baseBranch}" — skipping gate.`);
              return;
            }

            const violations = [];

            if (baseLintRaw) {
              const baseLint = parseInt(baseLintRaw, 10);
              if (!isNaN(baseLint)) {
                const delta = headLint - baseLint;
                if (delta > effectiveThreshold) {
                  violations.push(
                    `Lint: +${delta} warning(s) vs ${baseBranch} (${baseLint} → ${headLint}); ` +
                    `threshold is ${effectiveThreshold}`
                  );
                } else {
                  core.info(`Lint gate passed: delta=${delta}, threshold=${effectiveThreshold}.`);
                }
              }
            }

            if (baseTcRaw) {
              const baseTc = parseInt(baseTcRaw, 10);
              if (!isNaN(baseTc)) {
                const delta = headTc - baseTc;
                if (delta > effectiveThreshold) {
                  violations.push(
                    `Typecheck: +${delta} warning(s) vs ${baseBranch} (${baseTc} → ${headTc}); ` +
                    `threshold is ${effectiveThreshold}`
                  );
                } else {
                  core.info(`Typecheck gate passed: delta=${delta}, threshold=${effectiveThreshold}.`);
                }
              }
            }

            if (baseFormatRaw) {
              const baseFormat = parseInt(baseFormatRaw, 10);
              if (!isNaN(baseFormat)) {
                const delta = headFormat - baseFormat;
                if (delta > effectiveThreshold) {
                  violations.push(
                    `Format: +${delta} warning(s) vs ${baseBranch} (${baseFormat} → ${headFormat}); ` +
                    `threshold is ${effectiveThreshold}`
                  );
                } else {
                  core.info(`Format gate passed: delta=${delta}, threshold=${effectiveThreshold}.`);
                }
              }
            }

            if (violations.length > 0) {
              const lines = [
                `⛔ Warning regression gate failed (MAX_NEW_WARNINGS=${effectiveThreshold}):`,
                ...violations.map(v => `  • ${v}`),
                '',
                'Options:',
                '  1. Fix the new warnings before merging.',
                `  2. Add the "ci: allow-warning-increase" label to bypass this gate for intentional exceptions.`,
                `  3. Raise the MAX_NEW_WARNINGS repository variable if a higher tolerance is acceptable.`,
              ];
              core.setFailed(lines.join('\n'));
            }

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore TypeScript build cache (db)
        uses: actions/cache@v4
        with:
          path: |
            lib/db/dist
            lib/db/*.tsbuildinfo
          key: tsbuildinfo-db-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/db/tsconfig.json', 'lib/db/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-db-${{ runner.os }}-

      - name: Restore codegen cache (api-spec)
        uses: actions/cache@v4
        with:
          path: |
            lib/api-zod/src/generated
            lib/api-client-react/src/generated
          key: codegen-api-spec-${{ runner.os }}-${{ hashFiles('lib/api-spec/openapi.yaml', 'lib/api-spec/orval.config.ts') }}
          restore-keys: |
            codegen-api-spec-${{ runner.os }}-

      - name: Restore TypeScript build cache (api-zod)
        uses: actions/cache@v4
        with:
          path: |
            lib/api-zod/dist
            lib/api-zod/*.tsbuildinfo
          key: tsbuildinfo-api-zod-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/api-zod/tsconfig.json', 'lib/api-zod/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-api-zod-${{ runner.os }}-

      - name: Restore TypeScript build cache (api-client-react)
        uses: actions/cache@v4
        with:
          path: |
            lib/api-client-react/dist
            lib/api-client-react/*.tsbuildinfo
          key: tsbuildinfo-api-client-react-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/api-client-react/tsconfig.json', 'lib/api-client-react/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-api-client-react-${{ runner.os }}-

      - name: Restore TypeScript build cache (integrations-openai-ai-server)
        uses: actions/cache@v4
        with:
          path: |
            lib/integrations-openai-ai-server/dist
            lib/integrations-openai-ai-server/*.tsbuildinfo
          key: tsbuildinfo-integrations-openai-ai-server-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/integrations-openai-ai-server/tsconfig.json', 'lib/integrations-openai-ai-server/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-integrations-openai-ai-server-${{ runner.os }}-

      - name: Restore TypeScript solution build cache (root)
        uses: actions/cache@v4
        with:
          path: tsconfig.tsbuildinfo
          key: tsbuildinfo-root-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'tsconfig.base.json') }}
          restore-keys: |
            tsbuildinfo-root-${{ runner.os }}-

      - name: Build
        id: build
        run: |
          build_start_s=$SECONDS
          set +e
          build_output=$(pnpm run build 2>&1)
          build_exit=$?
          build_duration_s=$((SECONDS - build_start_s))
          set -e
          echo "$build_output"
          echo "build_duration_s=${build_duration_s}" >> "$GITHUB_OUTPUT"

          if [ $build_exit -ne 0 ]; then
            # Extract packages that failed: pnpm prints a line containing
            # ERR_PNPM_RECURSIVE_RUN_FIRST_FAIL followed by the package name.
            pkg_list=$(printf '%s\n' "$build_output" | awk '
              /ERR_PNPM_RECURSIVE_RUN_FIRST_FAIL/ {
                for (i = 1; i <= NF; i++) {
                  if ($i ~ /^@workspace\//) {
                    printf "- `%s`\n", $i
                    break
                  }
                }
              }
            ' | sort -u)

            # Also extract TypeScript errors in case the typecheck phase failed.
            # tsc error lines have the form: path/to/file.ts(line,col): error TSxxxx: …
            tc_file_list=$(printf '%s\n' "$build_output" | awk '
              /: error TS/ {
                f = $0
                sub(/\(.*/, "", f)
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", f)
                if (f != "") count[f]++
              }
              END {
                for (f in count)
                  printf "- `%s` — %d error(s)\n", f, count[f]
              }
            ' | sort)

            echo "## ❌ Build failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            if [ -n "$pkg_list" ]; then
              pkg_count=$(printf '%s\n' "$pkg_list" | grep -c '^-' || true)
              echo "**${pkg_count} package(s) failed to build:**" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              printf '%s\n' "$pkg_list" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi

            if [ -n "$tc_file_list" ]; then
              tc_file_count=$(printf '%s\n' "$tc_file_list" | grep -c '^-' || true)
              tc_error_count=$(printf '%s\n' "$build_output" | grep -c ': error TS' || true)
              echo "**${tc_error_count} TypeScript error(s) in ${tc_file_count} file(s):**" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              printf '%s\n' "$tc_file_list" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "Fix locally with:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "pnpm run build" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Full build output</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$build_output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Write build counts artifact
        if: always()
        run: |
          duration_s="${{ steps.build.outputs.build_duration_s }}"
          [ -z "$duration_s" ] && duration_s=0
          printf '{"duration_s":%d,"sha":"%s","ref":"%s"}\n' \
            "${duration_s}" "${GITHUB_SHA}" "${GITHUB_REF_NAME}" \
            > build-counts.json

      - name: Upload build counts artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-counts
          path: build-counts.json
          retention-days: 90

  clear-bot-comments:
    name: Clear CI bot comments on success
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build]
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    steps:
      - name: Delete stale CI bot comments
        uses: actions/github-script@v7
        with:
          script: |
            const markers = [
              '<!-- CI-BOT-format -->',
              '<!-- CI-BOT-lint -->',
              '<!-- CI-BOT-typecheck -->',
            ];

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComments = comments.filter((c) =>
              markers.some((m) => c.body.includes(m))
            );

            if (botComments.length === 0) {
              core.info('No CI bot comments found — nothing to clean up.');
              return;
            }

            for (const comment of botComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
              core.info(`Deleted CI bot comment ${comment.id}`);
            }
