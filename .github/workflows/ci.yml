name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/api-server/node_modules
            artifacts/mockup-sandbox/node_modules
            artifacts/urban-explorer/node_modules
            lib/api-client-react/node_modules
            lib/api-zod/node_modules
            lib/api-spec/node_modules
            lib/db/node_modules
            lib/integrations-openai-ai-server/node_modules
            lib/integrations/openai_ai_integrations/node_modules
            scripts/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

  format:
    name: Format (Prettier)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/api-server/node_modules
            artifacts/mockup-sandbox/node_modules
            artifacts/urban-explorer/node_modules
            lib/api-client-react/node_modules
            lib/api-zod/node_modules
            lib/api-spec/node_modules
            lib/db/node_modules
            lib/integrations-openai-ai-server/node_modules
            lib/integrations/openai_ai_integrations/node_modules
            scripts/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Check formatting (Prettier)
        id: format
        run: |
          pnpm run format:check || {
            echo "## ❌ Formatting check failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "One or more files are not formatted with Prettier." >> "$GITHUB_STEP_SUMMARY"
            echo "Run the following command locally to fix:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "pnpm run format && git commit -a --amend --no-edit" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Then push again." >> "$GITHUB_STEP_SUMMARY"
            echo ""
            echo "❌ Formatting issues detected. Run the following command locally to fix:"
            echo ""
            echo "    pnpm run format && git commit -a --amend --no-edit"
            echo ""
            echo "Then push again."
            exit 1
          }

      - name: Post PR comment on format failure
        if: steps.format.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- CI-BOT-format -->';
            const body = [
              marker,
              '## \u274c CI failed \u2014 Formatting (Prettier)',
              '',
              'One or more files are not formatted with Prettier. Fix it locally:',
              '',
              '```sh',
              'pnpm run format && git commit -a --amend --no-edit',
              '```',
              '',
              'Then push again.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/api-server/node_modules
            artifacts/mockup-sandbox/node_modules
            artifacts/urban-explorer/node_modules
            lib/api-client-react/node_modules
            lib/api-zod/node_modules
            lib/api-spec/node_modules
            lib/db/node_modules
            lib/integrations-openai-ai-server/node_modules
            lib/integrations/openai_ai_integrations/node_modules
            scripts/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Lint (ESLint)
        id: lint
        run: |
          lint_output=$(pnpm run lint 2>&1) && echo "$lint_output" || {
            echo "$lint_output"

            # Build a per-file error summary from ESLint's default output.
            # File header lines start at column 0 and contain a source extension;
            # error lines are indented and contain the word "error".
            lint_file_list=$(printf '%s\n' "$lint_output" | awk '
              /^[^ \t]/ && /\.(ts|tsx|js|jsx|mjs|cjs)/ { current_file = $0; next }
              /[[:space:]]error[[:space:]]/ { count[current_file]++ }
              END {
                for (f in count)
                  if (f != "" && count[f] > 0)
                    printf "- `%s` — %d error(s)\n", f, count[f]
              }
            ' | sort)
            lint_file_count=$(printf '%s\n' "$lint_file_list" | grep -c '^-' || true)
            lint_error_count=$(printf '%s\n' "$lint_output" | grep -c '[[:space:]]error[[:space:]]' || true)

            echo "## ❌ Lint failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ -n "$lint_file_list" ]; then
              echo "**${lint_error_count} error(s) in ${lint_file_count} file(s):**" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              printf '%s\n' "$lint_file_list" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "ESLint reported errors. Fix them locally with:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "pnpm run lint" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Full lint output</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$lint_output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            truncated=$(echo "$lint_output" | head -c 5000)
            echo "lint_output<<ENDOFOUTPUT" >> "$GITHUB_OUTPUT"
            echo "$truncated" >> "$GITHUB_OUTPUT"
            echo "ENDOFOUTPUT" >> "$GITHUB_OUTPUT"
            exit 1
          }

      - name: Post PR comment on lint failure
        if: steps.lint.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          LINT_OUTPUT: ${{ steps.lint.outputs.lint_output }}
        with:
          script: |
            const marker = '<!-- CI-BOT-lint -->';
            const lintOutput = process.env.LINT_OUTPUT || '';
            const body = [
              marker,
              '## \u274c CI failed \u2014 Lint (ESLint)',
              '',
              'ESLint reported errors. Fix them locally with:',
              '',
              '```sh',
              'pnpm run lint',
              '```',
              '',
              '<details><summary>Full lint output</summary>',
              '',
              '```',
              lintOutput,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  typecheck:
    name: Typecheck (TypeScript)
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            artifacts/api-server/node_modules
            artifacts/mockup-sandbox/node_modules
            artifacts/urban-explorer/node_modules
            lib/api-client-react/node_modules
            lib/api-zod/node_modules
            lib/api-spec/node_modules
            lib/db/node_modules
            lib/integrations-openai-ai-server/node_modules
            lib/integrations/openai_ai_integrations/node_modules
            scripts/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Restore TypeScript build cache (db)
        uses: actions/cache@v4
        with:
          path: |
            lib/db/dist
            lib/db/*.tsbuildinfo
          key: tsbuildinfo-db-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/db/tsconfig.json', 'lib/db/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-db-${{ runner.os }}-

      - name: Restore codegen cache (api-spec)
        uses: actions/cache@v4
        with:
          path: |
            lib/api-zod/src/generated
            lib/api-client-react/src/generated
          key: codegen-api-spec-${{ runner.os }}-${{ hashFiles('lib/api-spec/openapi.yaml', 'lib/api-spec/orval.config.ts') }}
          restore-keys: |
            codegen-api-spec-${{ runner.os }}-

      - name: Restore TypeScript build cache (api-zod)
        uses: actions/cache@v4
        with:
          path: |
            lib/api-zod/dist
            lib/api-zod/*.tsbuildinfo
          key: tsbuildinfo-api-zod-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/api-zod/tsconfig.json', 'lib/api-zod/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-api-zod-${{ runner.os }}-

      - name: Restore TypeScript build cache (api-client-react)
        uses: actions/cache@v4
        with:
          path: |
            lib/api-client-react/dist
            lib/api-client-react/*.tsbuildinfo
          key: tsbuildinfo-api-client-react-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/api-client-react/tsconfig.json', 'lib/api-client-react/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-api-client-react-${{ runner.os }}-

      - name: Restore TypeScript build cache (integrations-openai-ai-server)
        uses: actions/cache@v4
        with:
          path: |
            lib/integrations-openai-ai-server/dist
            lib/integrations-openai-ai-server/*.tsbuildinfo
          key: tsbuildinfo-integrations-openai-ai-server-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/integrations-openai-ai-server/tsconfig.json', 'lib/integrations-openai-ai-server/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-integrations-openai-ai-server-${{ runner.os }}-

      - name: Restore TypeScript solution build cache (root)
        uses: actions/cache@v4
        with:
          path: tsconfig.tsbuildinfo
          key: tsbuildinfo-root-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'tsconfig.base.json') }}
          restore-keys: |
            tsbuildinfo-root-${{ runner.os }}-

      - name: Typecheck (TypeScript)
        id: typecheck
        run: |
          tc_output=$(pnpm run typecheck 2>&1) && echo "$tc_output" || {
            echo "$tc_output"

            # Build a per-file error summary from tsc output.
            # tsc error lines have the form: path/to/file.ts(line,col): error TSxxxx: …
            tc_file_list=$(printf '%s\n' "$tc_output" | awk '
              /: error TS/ {
                # Extract the file path: everything before the first "("
                f = $0
                sub(/\(.*/, "", f)
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", f)
                if (f != "") count[f]++
              }
              END {
                for (f in count)
                  printf "- `%s` — %d error(s)\n", f, count[f]
              }
            ' | sort)
            tc_file_count=$(printf '%s\n' "$tc_file_list" | grep -c '^-' || true)
            tc_error_count=$(printf '%s\n' "$tc_output" | grep -c ': error TS' || true)

            echo "## ❌ Typecheck failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            if [ -n "$tc_file_list" ]; then
              echo "**${tc_error_count} error(s) in ${tc_file_count} file(s):**" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              printf '%s\n' "$tc_file_list" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "TypeScript reported type errors. Fix them locally with:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "pnpm run typecheck" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Full typecheck output</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$tc_output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            truncated=$(echo "$tc_output" | head -c 5000)
            echo "tc_output<<ENDOFOUTPUT" >> "$GITHUB_OUTPUT"
            echo "$truncated" >> "$GITHUB_OUTPUT"
            echo "ENDOFOUTPUT" >> "$GITHUB_OUTPUT"
            exit 1
          }

      - name: Post PR comment on typecheck failure
        if: steps.typecheck.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          TC_OUTPUT: ${{ steps.typecheck.outputs.tc_output }}
        with:
          script: |
            const marker = '<!-- CI-BOT-typecheck -->';
            const tcOutput = process.env.TC_OUTPUT || '';
            const body = [
              marker,
              '## \u274c CI failed \u2014 Typecheck (TypeScript)',
              '',
              'TypeScript reported type errors. Fix them locally with:',
              '',
              '```sh',
              'pnpm run typecheck',
              '```',
              '',
              '<details><summary>Full typecheck output</summary>',
              '',
              '```',
              tcOutput,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore TypeScript build cache (db)
        uses: actions/cache@v4
        with:
          path: |
            lib/db/dist
            lib/db/*.tsbuildinfo
          key: tsbuildinfo-db-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/db/tsconfig.json', 'lib/db/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-db-${{ runner.os }}-

      - name: Restore codegen cache (api-spec)
        uses: actions/cache@v4
        with:
          path: |
            lib/api-zod/src/generated
            lib/api-client-react/src/generated
          key: codegen-api-spec-${{ runner.os }}-${{ hashFiles('lib/api-spec/openapi.yaml', 'lib/api-spec/orval.config.ts') }}
          restore-keys: |
            codegen-api-spec-${{ runner.os }}-

      - name: Restore TypeScript build cache (api-zod)
        uses: actions/cache@v4
        with:
          path: |
            lib/api-zod/dist
            lib/api-zod/*.tsbuildinfo
          key: tsbuildinfo-api-zod-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/api-zod/tsconfig.json', 'lib/api-zod/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-api-zod-${{ runner.os }}-

      - name: Restore TypeScript build cache (api-client-react)
        uses: actions/cache@v4
        with:
          path: |
            lib/api-client-react/dist
            lib/api-client-react/*.tsbuildinfo
          key: tsbuildinfo-api-client-react-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/api-client-react/tsconfig.json', 'lib/api-client-react/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-api-client-react-${{ runner.os }}-

      - name: Restore TypeScript build cache (integrations-openai-ai-server)
        uses: actions/cache@v4
        with:
          path: |
            lib/integrations-openai-ai-server/dist
            lib/integrations-openai-ai-server/*.tsbuildinfo
          key: tsbuildinfo-integrations-openai-ai-server-${{ runner.os }}-${{ hashFiles('tsconfig.base.json', 'lib/integrations-openai-ai-server/tsconfig.json', 'lib/integrations-openai-ai-server/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-integrations-openai-ai-server-${{ runner.os }}-

      - name: Restore TypeScript solution build cache (root)
        uses: actions/cache@v4
        with:
          path: tsconfig.tsbuildinfo
          key: tsbuildinfo-root-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'tsconfig.base.json') }}
          restore-keys: |
            tsbuildinfo-root-${{ runner.os }}-

      - name: Build
        run: |
          build_output=$(pnpm run build 2>&1) && echo "$build_output" || {
            echo "$build_output"

            # Extract packages that failed: pnpm prints a line containing
            # ERR_PNPM_RECURSIVE_RUN_FIRST_FAIL followed by the package name.
            pkg_list=$(printf '%s\n' "$build_output" | awk '
              /ERR_PNPM_RECURSIVE_RUN_FIRST_FAIL/ {
                for (i = 1; i <= NF; i++) {
                  if ($i ~ /^@workspace\//) {
                    printf "- `%s`\n", $i
                    break
                  }
                }
              }
            ' | sort -u)

            # Also extract TypeScript errors in case the typecheck phase failed.
            # tsc error lines have the form: path/to/file.ts(line,col): error TSxxxx: …
            tc_file_list=$(printf '%s\n' "$build_output" | awk '
              /: error TS/ {
                f = $0
                sub(/\(.*/, "", f)
                gsub(/^[[:space:]]+|[[:space:]]+$/, "", f)
                if (f != "") count[f]++
              }
              END {
                for (f in count)
                  printf "- `%s` — %d error(s)\n", f, count[f]
              }
            ' | sort)

            echo "## ❌ Build failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            if [ -n "$pkg_list" ]; then
              pkg_count=$(printf '%s\n' "$pkg_list" | grep -c '^-' || true)
              echo "**${pkg_count} package(s) failed to build:**" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              printf '%s\n' "$pkg_list" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi

            if [ -n "$tc_file_list" ]; then
              tc_file_count=$(printf '%s\n' "$tc_file_list" | grep -c '^-' || true)
              tc_error_count=$(printf '%s\n' "$build_output" | grep -c ': error TS' || true)
              echo "**${tc_error_count} TypeScript error(s) in ${tc_file_count} file(s):**" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              printf '%s\n' "$tc_file_list" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi

            echo "Fix locally with:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "pnpm run build" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Full build output</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$build_output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }
