name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Format, Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting (Prettier)
        run: |
          pnpm run format:check || (
            echo ""
            echo "❌ Formatting issues detected. Run the following command locally to fix:"
            echo ""
            echo "    pnpm run format && git commit -a --amend --no-edit"
            echo ""
            echo "Then push again."
            exit 1
          )

      - name: Restore TypeScript build cache
        uses: actions/cache@v4
        with:
          path: |
            lib/*/dist
            lib/*/*.tsbuildinfo
            tsconfig.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'tsconfig.base.json', 'lib/*/tsconfig.json', 'lib/*/src/**/*.ts') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-

      - name: Run CI checks (lint + typecheck)
        run: pnpm run lint && pnpm run typecheck
