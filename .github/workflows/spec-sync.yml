name: Spec Sync

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  spec-sync:
    name: Codegen + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run spec-sync (codegen + typecheck)
        run: pnpm run spec-sync

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint (conflict markers + ESLint)
        run: pnpm run lint

  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting (Prettier)
        run: |
          pnpm run format:check || (
            echo ""
            echo "❌ Formatting issues detected. Run the following command locally to fix:"
            echo ""
            echo "    pnpm run format"
            echo ""
            echo "Then commit the changes and push again."
            exit 1
          )
