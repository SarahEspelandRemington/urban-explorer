openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: explore
    description: Urban exploration operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /explore/discover:
    post:
      operationId: discoverPlaces
      tags: [explore]
      summary: Discover interesting places nearby
      description: Given coordinates, returns interesting historical facts and stories about nearby buildings and spaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoverRequest"
      responses:
        "200":
          description: Discovered places with facts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverResponse"
  /explore/suggest-locations:
    post:
      operationId: suggestLocations
      tags: [explore]
      summary: Get location suggestions as user types
      description: Returns a list of location suggestions matching a partial query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestLocationsRequest"
      responses:
        "200":
          description: Location suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestionsResult"
  /explore/geocode:
    post:
      operationId: geocodeLocation
      tags: [explore]
      summary: Convert a location name to coordinates
      description: Uses AI to geocode a city, neighborhood, intersection, or landmark name into latitude/longitude coordinates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeocodeRequest"
      responses:
        "200":
          description: Geocoded coordinates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeocodeResponse"
  /explore/investigate-address:
    post:
      operationId: investigateAddress
      tags: [explore]
      summary: Deep-dive investigation of a specific street address
      description: Geocodes a user-supplied address and returns a focused historical investigation of that specific building (architecture, era, original use, neighborhood context). Use this for buildings the user notices that aren't surfaced by GPS Discover.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddressInvestigationRequest"
      responses:
        "200":
          description: Investigation result for the specific address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressInvestigationResponse"
        "404":
          description: Address could not be geocoded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressNotFoundError"
  /explore/place-detail:
    post:
      operationId: getPlaceDetail
      tags: [explore]
      summary: Get detailed info about a specific place
      description: Returns in-depth historical information and stories about a specific place
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceDetailRequest"
      responses:
        "200":
          description: Detailed place information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetailResponse"
  /explore/place-timeline:
    post:
      operationId: getPlaceTimeline
      tags: [explore]
      summary: Get a historical timeline for a place
      description: Returns era-by-era snapshots showing how a place evolved through history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceTimelineRequest"
      responses:
        "200":
          description: Historical timeline with eras
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceTimelineResponse"
  /explore/walk-narration:
    post:
      operationId: getWalkNarration
      tags: [explore]
      summary: Generate a walking tour narration for a place
      description: Converts place facts into natural-sounding speech text optimized for TTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalkNarrationRequest"
      responses:
        "200":
          description: Generated narration text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalkNarrationResponse"
  /explore/route:
    post:
      operationId: getRoute
      tags: [explore]
      summary: Get a pedestrian walking route
      description: Returns a pedestrian walking route between a start and end point with optional intermediate waypoints, using OpenStreetMap-based routing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteRequest"
      responses:
        "200":
          description: Routing geometry, distance, and duration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteResponse"
  /explore/places-along-route:
    post:
      operationId: getPlacesAlongRoute
      tags: [explore]
      summary: Find historical places along a planned route
      description: Given a route geometry, finds interesting historical places near the route and returns them in walking order with progress along the route.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlacesAlongRouteRequest"
      responses:
        "200":
          description: Ordered list of places along the route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlacesAlongRouteResponse"
  /explore/rate-place:
    post:
      operationId: ratePlace
      tags: [explore]
      summary: Rate a place
      description: Submit a thumbs-up or thumbs-down rating for a discovered place. Supports toggling off an existing rating (rating="none") and switching between ratings via the optional previousRating field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatePlaceRequest"
      responses:
        "200":
          description: Updated vote counts for the place
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatePlaceResponse"
  /explore/ratings:
    get:
      operationId: getRatings
      tags: [explore]
      summary: Get aggregate rating data
      description: Returns all rated places sorted by net score (up minus down)
      responses:
        "200":
          description: Sorted list of place ratings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatingsResponse"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "200":
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      responses:
        "302":
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
        - $ref: "#/components/parameters/SessionCookie"
      responses:
        "302":
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MobileTokenExchangeRequest"
      responses:
        "200":
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MobileTokenExchangeSuccess"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "500":
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: "#/components/parameters/AuthorizationSessionHeader"
      responses:
        "200":
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutSuccess"
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DiscoverRequest:
      type: object
      properties:
        latitude:
          type: number
          description: Current latitude
        longitude:
          type: number
          description: Current longitude
        radius:
          type: number
          minimum: 50
          maximum: 1000
          description: Search radius in meters (default 300 for full mode, 500 for quick)
        accuracy:
          type: number
          minimum: 0
          maximum: 10000
          description: Reported GPS horizontal accuracy in meters. Used to bucket the cache key so a low-accuracy fix cannot poison results for a later high-accuracy fix at the same coordinates.
        mode:
          type: string
          enum: [full, quick]
          description: "Discovery mode — 'full' uses the most capable model (default), 'quick' uses a faster model for map panning"
        includeBuildingTypes:
          type: array
          items:
            type: string
          description: "Building type keys to un-filter from the default denylist (e.g. garage, shed). Allows callers to opt specific boring types back in."
        addressHint:
          type: string
          maxLength: 200
          description: "Optional human-readable address or neighbourhood context for the current location (e.g. 'South St & 2nd Ave, Old City, Philadelphia'). Sourced from the device reverse-geocode cache — never blocks the request. Injected into the brainstorm step to improve obscure-history recall."
      required:
        - latitude
        - longitude
    DiscoverResponse:
      type: object
      properties:
        places:
          type: array
          items:
            $ref: "#/components/schemas/Place"
        location:
          type: string
          description: Human-readable description of the area
      required:
        - places
        - location
    Place:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
          description: "Type of place (e.g., building, monument, park, bridge)"
        yearBuilt:
          type: string
          description: "Approximate year or era built"
        tags:
          type: array
          items:
            type: string
          description: "Descriptive tags like ghost sign, art deco, etc."
        summary:
          type: string
          description: "Brief one-line description"
        facts:
          type: array
          items:
            type: string
          description: "List of interesting historical facts"
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
          description: "Nearest real street address or intersection"
        distanceMeters:
          type: number
        confidence:
          type: string
          enum: [high, medium, low]
          description: "How confident the AI is about this place's existence and details"
        photoUrl:
          type: string
          description: "URL of a representative photo for this place, when available (sourced from Wikipedia)"
      required:
        - id
        - name
        - category
        - summary
        - facts
        - latitude
        - longitude
    SuggestLocationsRequest:
      type: object
      properties:
        query:
          type: string
          description: "Partial location text the user has typed so far"
        nearLocation:
          type: string
          description: "Optional hint describing where the user is searching near, used to bias results"
          maxLength: 200
      required:
        - query
    SuggestionsResult:
      type: object
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/LocationSuggestion"
      required:
        - suggestions
    LocationSuggestion:
      type: object
      properties:
        name:
          type: string
          description: "Full location name"
        description:
          type: string
          description: "Short context about the location"
      required:
        - name
        - description
    GeocodeRequest:
      type: object
      properties:
        query:
          type: string
          description: "Location name — city, neighborhood, intersection, or address"
      required:
        - query
    GeocodeResponse:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        displayName:
          type: string
          description: "Human-readable name of the resolved location"
      required:
        - latitude
        - longitude
        - displayName
    AddressNotFoundError:
      type: object
      properties:
        error:
          type: string
          description: "Human-readable error message"
        suggestions:
          type: array
          items:
            type: string
          description: "1-2 alternative place names the user could try searching for instead"
      required:
        - error
    AddressInvestigationRequest:
      type: object
      properties:
        address:
          type: string
          minLength: 3
          maxLength: 250
          description: "Free-text street address the user wants to investigate (e.g., '538 W 38th St, New York, NY')"
        latitude:
          type: number
          description: "Optional pre-resolved latitude. If absent, the server geocodes the address."
        longitude:
          type: number
          description: "Optional pre-resolved longitude."
      required:
        - address
    AddressInvestigationResponse:
      type: object
      properties:
        address:
          type: string
          description: "Canonical address as resolved (may include neighborhood, city)"
        latitude:
          type: number
        longitude:
          type: number
        buildingName:
          type: string
          description: "Common name if the building has one (e.g., 'Hewitt Stables'). Empty string if unknown."
        yearBuilt:
          type: string
          description: "Approximate year or era (e.g., '1887' or 'late 1880s'). Empty string if unknown."
        architecturalStyle:
          type: string
          description: "Architectural style + specific details to look for. Empty string if unclear."
        originalUse:
          type: string
          description: "What the building was originally constructed for"
        currentUse:
          type: string
          description: "What it appears to be used for today"
        history:
          type: string
          description: "Rich 2-3 paragraph narrative about this specific building"
        facts:
          type: array
          items:
            type: string
          description: "4-6 specific, verifiable-feeling facts about this building"
        neighborhoodContext:
          type: string
          description: "How this building fits the historical fabric of the immediate block"
        uncertainty:
          type: string
          description: "Honest disclosure of what's speculative vs documented. Empty string if fully confident."
        searchSuggestions:
          type: array
          items:
            type: string
          description: "1-2 alternative search suggestions derived from nearby OSM landmarks, populated only when the result is empty so the user has concrete alternatives to try"
      required:
        - address
        - latitude
        - longitude
        - history
        - facts
        - originalUse
    PlaceDetailRequest:
      type: object
      properties:
        placeName:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        category:
          type: string
      required:
        - placeName
        - latitude
        - longitude
    PlaceDetailResponse:
      type: object
      properties:
        name:
          type: string
        fullHistory:
          type: string
          description: "Rich historical narrative about the place"
        architecturalStyle:
          type: string
        notableEvents:
          type: array
          items:
            type: string
        funFacts:
          type: array
          items:
            type: string
        nearbyRelated:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              latitude:
                type: number
              longitude:
                type: number
              category:
                type: string
            required:
              - name
              - latitude
              - longitude
          description: "Nearby related places worth visiting, with coordinates"
      required:
        - name
        - fullHistory
        - funFacts
    PlaceTimelineRequest:
      type: object
      properties:
        placeName:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        category:
          type: string
        yearBuilt:
          type: string
          description: "Known year or era the place was built"
      required:
        - placeName
        - latitude
        - longitude
    PlaceTimelineResponse:
      type: object
      properties:
        placeName:
          type: string
        eras:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEra"
      required:
        - placeName
        - eras
    TimelineEra:
      type: object
      properties:
        period:
          type: string
          description: "Date range like '1850s-1880s' or '1920'"
        title:
          type: string
          description: "Short era title like 'Original Construction' or 'The Jazz Age'"
        description:
          type: string
          description: "Vivid 2-3 sentence description of what this place was like during this era"
        visualDescription:
          type: string
          description: "What someone standing here would see — architecture, signage, street life, materials"
        keyFigures:
          type: array
          items:
            type: string
          description: "Notable people connected to this place during this era"
        atmosphere:
          type: string
          description: "One evocative sentence capturing the mood/feel of this era"
      required:
        - period
        - title
        - description
        - atmosphere
    WalkNarrationRequest:
      type: object
      properties:
        placeName:
          type: string
        category:
          type: string
        summary:
          type: string
        fact:
          type: string
      required:
        - placeName
        - summary
    WalkNarrationResponse:
      type: object
      properties:
        narration:
          type: string
          description: "Natural-sounding narration text for TTS"
      required:
        - narration
    LatLng:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
      required:
        - latitude
        - longitude
    RouteRequest:
      type: object
      properties:
        start:
          $ref: "#/components/schemas/LatLng"
        end:
          $ref: "#/components/schemas/LatLng"
        waypoints:
          type: array
          items:
            $ref: "#/components/schemas/LatLng"
          maxItems: 10
          description: "Optional intermediate waypoints, in order, between start and end (max 10)"
      required:
        - start
        - end
    RouteResponse:
      type: object
      properties:
        geometry:
          type: array
          description: "Route polyline as ordered [latitude, longitude] pairs"
          items:
            type: array
            items:
              type: number
        distanceMeters:
          type: number
        durationSeconds:
          type: number
      required:
        - geometry
        - distanceMeters
        - durationSeconds
    PlacesAlongRouteRequest:
      type: object
      properties:
        geometry:
          type: array
          description: "Route polyline as ordered [latitude, longitude] pairs (max 500 points)"
          maxItems: 500
          minItems: 2
          items:
            type: array
            items:
              type: number
            minItems: 2
            maxItems: 2
        maxPlaces:
          type: integer
          description: "Maximum number of places to return (default 8, max 20)"
          minimum: 1
          maximum: 20
        corridorMeters:
          type: number
          description: "How far from the route to look for places, in meters (default 120, range 10–300)"
          minimum: 10
          maximum: 300
      required:
        - geometry
    RoutePlace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        yearBuilt:
          type: string
        tags:
          type: array
          items:
            type: string
        summary:
          type: string
        facts:
          type: array
          items:
            type: string
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
        progressMeters:
          type: number
          description: "Distance from the route start to the closest point on the route, in meters"
        offsetMeters:
          type: number
          description: "Perpendicular distance from the route to the place, in meters"
      required:
        - id
        - name
        - category
        - summary
        - facts
        - latitude
        - longitude
        - progressMeters
        - offsetMeters
    PlacesAlongRouteResponse:
      type: object
      properties:
        places:
          type: array
          items:
            $ref: "#/components/schemas/RoutePlace"
      required:
        - places
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, "null"]
        firstName:
          type: [string, "null"]
        lastName:
          type: [string, "null"]
        profileImageUrl:
          type: [string, "null"]
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    RatePlaceRating:
      type: string
      enum: [up, down, none]
      description: "'up' or 'down' to cast a vote; 'none' to remove an existing vote"
    RatePlaceRequest:
      type: object
      required: [placeId, placeName, category, latitude, longitude, rating]
      properties:
        placeId:
          type: string
          minLength: 1
          maxLength: 500
        placeName:
          type: string
          minLength: 1
          maxLength: 200
        category:
          type: string
          minLength: 1
          maxLength: 100
        latitude:
          type: number
        longitude:
          type: number
        rating:
          $ref: "#/components/schemas/RatePlaceRating"
        previousRating:
          type: string
          enum: [up, down]
          description: "The user's prior rating for this place, used to compute accurate deltas (decrement old, increment new)"
    RatePlaceResponse:
      type: object
      required: [ok, placeId, up, down]
      properties:
        ok:
          type: boolean
        placeId:
          type: string
        up:
          type: integer
          description: "Total up votes after this action"
        down:
          type: integer
          description: "Total down votes after this action"
    PlaceRatingEntry:
      type: object
      required:
        [
          placeId,
          placeName,
          category,
          latitude,
          longitude,
          up,
          down,
          lastRatedAt,
          netScore,
        ]
      properties:
        placeId:
          type: string
        placeName:
          type: string
        category:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        up:
          type: integer
        down:
          type: integer
        lastRatedAt:
          type: string
          format: date-time
        netScore:
          type: integer
          description: "up minus down"
    RatingsResponse:
      type: object
      required: [ratings, total]
      properties:
        ratings:
          type: array
          items:
            $ref: "#/components/schemas/PlaceRatingEntry"
          description: "Places sorted by netScore descending"
        total:
          type: integer
