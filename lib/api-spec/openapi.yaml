openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: explore
    description: Urban exploration operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /explore/discover:
    post:
      operationId: discoverPlaces
      tags: [explore]
      summary: Discover interesting places nearby
      description: Given coordinates, returns interesting historical facts and stories about nearby buildings and spaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoverRequest"
      responses:
        "200":
          description: Discovered places with facts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverResponse"
  /explore/suggest-locations:
    post:
      operationId: suggestLocations
      tags: [explore]
      summary: Get location suggestions as user types
      description: Returns a list of location suggestions matching a partial query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestLocationsRequest"
      responses:
        "200":
          description: Location suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestionsResult"
  /explore/geocode:
    post:
      operationId: geocodeLocation
      tags: [explore]
      summary: Convert a location name to coordinates
      description: Uses AI to geocode a city, neighborhood, intersection, or landmark name into latitude/longitude coordinates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeocodeRequest"
      responses:
        "200":
          description: Geocoded coordinates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeocodeResponse"
  /explore/place-detail:
    post:
      operationId: getPlaceDetail
      tags: [explore]
      summary: Get detailed info about a specific place
      description: Returns in-depth historical information and stories about a specific place
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceDetailRequest"
      responses:
        "200":
          description: Detailed place information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetailResponse"
  /explore/walk-narration:
    post:
      operationId: getWalkNarration
      tags: [explore]
      summary: Generate a walking tour narration for a place
      description: Converts place facts into natural-sounding speech text optimized for TTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalkNarrationRequest"
      responses:
        "200":
          description: Generated narration text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalkNarrationResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DiscoverRequest:
      type: object
      properties:
        latitude:
          type: number
          description: Current latitude
        longitude:
          type: number
          description: Current longitude
        radius:
          type: number
          description: Search radius in meters (default 500)
      required:
        - latitude
        - longitude
    DiscoverResponse:
      type: object
      properties:
        places:
          type: array
          items:
            $ref: "#/components/schemas/Place"
        location:
          type: string
          description: Human-readable description of the area
      required:
        - places
        - location
    Place:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
          description: "Type of place (e.g., building, monument, park, bridge)"
        yearBuilt:
          type: string
          description: "Approximate year or era built"
        tags:
          type: array
          items:
            type: string
          description: "Descriptive tags like ghost sign, art deco, etc."
        summary:
          type: string
          description: "Brief one-line description"
        facts:
          type: array
          items:
            type: string
          description: "List of interesting historical facts"
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
          description: "Nearest real street address or intersection"
        distanceMeters:
          type: number
        confidence:
          type: string
          enum: [high, medium, low]
          description: "How confident the AI is about this place's existence and details"
      required:
        - id
        - name
        - category
        - summary
        - facts
        - latitude
        - longitude
    SuggestLocationsRequest:
      type: object
      properties:
        query:
          type: string
          description: "Partial location text the user has typed so far"
      required:
        - query
    SuggestionsResult:
      type: object
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/LocationSuggestion"
      required:
        - suggestions
    LocationSuggestion:
      type: object
      properties:
        name:
          type: string
          description: "Full location name"
        description:
          type: string
          description: "Short context about the location"
      required:
        - name
        - description
    GeocodeRequest:
      type: object
      properties:
        query:
          type: string
          description: "Location name — city, neighborhood, intersection, or address"
      required:
        - query
    GeocodeResponse:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        displayName:
          type: string
          description: "Human-readable name of the resolved location"
      required:
        - latitude
        - longitude
        - displayName
    PlaceDetailRequest:
      type: object
      properties:
        placeName:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        category:
          type: string
      required:
        - placeName
        - latitude
        - longitude
    PlaceDetailResponse:
      type: object
      properties:
        name:
          type: string
        fullHistory:
          type: string
          description: "Rich historical narrative about the place"
        architecturalStyle:
          type: string
        notableEvents:
          type: array
          items:
            type: string
        funFacts:
          type: array
          items:
            type: string
        nearbyRelated:
          type: array
          items:
            type: string
          description: "Names of related nearby places worth visiting"
      required:
        - name
        - fullHistory
        - funFacts
    WalkNarrationRequest:
      type: object
      properties:
        placeName:
          type: string
        category:
          type: string
        summary:
          type: string
        fact:
          type: string
      required:
        - placeName
        - summary
    WalkNarrationResponse:
      type: object
      properties:
        narration:
          type: string
          description: "Natural-sounding narration text for TTS"
      required:
        - narration
