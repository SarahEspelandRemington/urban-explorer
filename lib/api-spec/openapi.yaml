openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: explore
    description: Urban exploration operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /explore/discover:
    post:
      operationId: discoverPlaces
      tags: [explore]
      summary: Discover interesting places nearby
      description: Given coordinates, returns interesting historical facts and stories about nearby buildings and spaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoverRequest"
      responses:
        "200":
          description: Discovered places with facts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverResponse"
  /explore/suggest-locations:
    post:
      operationId: suggestLocations
      tags: [explore]
      summary: Get location suggestions as user types
      description: Returns a list of location suggestions matching a partial query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestLocationsRequest"
      responses:
        "200":
          description: Location suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestionsResult"
  /explore/geocode:
    post:
      operationId: geocodeLocation
      tags: [explore]
      summary: Convert a location name to coordinates
      description: Uses AI to geocode a city, neighborhood, intersection, or landmark name into latitude/longitude coordinates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeocodeRequest"
      responses:
        "200":
          description: Geocoded coordinates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeocodeResponse"
  /explore/place-detail:
    post:
      operationId: getPlaceDetail
      tags: [explore]
      summary: Get detailed info about a specific place
      description: Returns in-depth historical information and stories about a specific place
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceDetailRequest"
      responses:
        "200":
          description: Detailed place information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetailResponse"
  /explore/place-timeline:
    post:
      operationId: getPlaceTimeline
      tags: [explore]
      summary: Get a historical timeline for a place
      description: Returns era-by-era snapshots showing how a place evolved through history
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceTimelineRequest"
      responses:
        "200":
          description: Historical timeline with eras
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceTimelineResponse"
  /explore/walk-narration:
    post:
      operationId: getWalkNarration
      tags: [explore]
      summary: Generate a walking tour narration for a place
      description: Converts place facts into natural-sounding speech text optimized for TTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalkNarrationRequest"
      responses:
        "200":
          description: Generated narration text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalkNarrationResponse"
  /explore/route:
    post:
      operationId: getRoute
      tags: [explore]
      summary: Get a pedestrian walking route
      description: Returns a pedestrian walking route between a start and end point with optional intermediate waypoints, using OpenStreetMap-based routing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteRequest"
      responses:
        "200":
          description: Routing geometry, distance, and duration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteResponse"
  /explore/places-along-route:
    post:
      operationId: getPlacesAlongRoute
      tags: [explore]
      summary: Find historical places along a planned route
      description: Given a route geometry, finds interesting historical places near the route and returns them in walking order with progress along the route.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlacesAlongRouteRequest"
      responses:
        "200":
          description: Ordered list of places along the route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlacesAlongRouteResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DiscoverRequest:
      type: object
      properties:
        latitude:
          type: number
          description: Current latitude
        longitude:
          type: number
          description: Current longitude
        radius:
          type: number
          description: Search radius in meters (default 500)
        mode:
          type: string
          enum: [full, quick]
          description: "Discovery mode — 'full' uses the most capable model (default), 'quick' uses a faster model for map panning"
      required:
        - latitude
        - longitude
    DiscoverResponse:
      type: object
      properties:
        places:
          type: array
          items:
            $ref: "#/components/schemas/Place"
        location:
          type: string
          description: Human-readable description of the area
      required:
        - places
        - location
    Place:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
          description: "Type of place (e.g., building, monument, park, bridge)"
        yearBuilt:
          type: string
          description: "Approximate year or era built"
        tags:
          type: array
          items:
            type: string
          description: "Descriptive tags like ghost sign, art deco, etc."
        summary:
          type: string
          description: "Brief one-line description"
        facts:
          type: array
          items:
            type: string
          description: "List of interesting historical facts"
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
          description: "Nearest real street address or intersection"
        distanceMeters:
          type: number
        confidence:
          type: string
          enum: [high, medium, low]
          description: "How confident the AI is about this place's existence and details"
      required:
        - id
        - name
        - category
        - summary
        - facts
        - latitude
        - longitude
    SuggestLocationsRequest:
      type: object
      properties:
        query:
          type: string
          description: "Partial location text the user has typed so far"
      required:
        - query
    SuggestionsResult:
      type: object
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/LocationSuggestion"
      required:
        - suggestions
    LocationSuggestion:
      type: object
      properties:
        name:
          type: string
          description: "Full location name"
        description:
          type: string
          description: "Short context about the location"
      required:
        - name
        - description
    GeocodeRequest:
      type: object
      properties:
        query:
          type: string
          description: "Location name — city, neighborhood, intersection, or address"
      required:
        - query
    GeocodeResponse:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        displayName:
          type: string
          description: "Human-readable name of the resolved location"
      required:
        - latitude
        - longitude
        - displayName
    PlaceDetailRequest:
      type: object
      properties:
        placeName:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        category:
          type: string
      required:
        - placeName
        - latitude
        - longitude
    PlaceDetailResponse:
      type: object
      properties:
        name:
          type: string
        fullHistory:
          type: string
          description: "Rich historical narrative about the place"
        architecturalStyle:
          type: string
        notableEvents:
          type: array
          items:
            type: string
        funFacts:
          type: array
          items:
            type: string
        nearbyRelated:
          type: array
          items:
            type: string
          description: "Names of related nearby places worth visiting"
      required:
        - name
        - fullHistory
        - funFacts
    PlaceTimelineRequest:
      type: object
      properties:
        placeName:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        category:
          type: string
        yearBuilt:
          type: string
          description: "Known year or era the place was built"
      required:
        - placeName
        - latitude
        - longitude
    PlaceTimelineResponse:
      type: object
      properties:
        placeName:
          type: string
        eras:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEra"
      required:
        - placeName
        - eras
    TimelineEra:
      type: object
      properties:
        period:
          type: string
          description: "Date range like '1850s-1880s' or '1920'"
        title:
          type: string
          description: "Short era title like 'Original Construction' or 'The Jazz Age'"
        description:
          type: string
          description: "Vivid 2-3 sentence description of what this place was like during this era"
        visualDescription:
          type: string
          description: "What someone standing here would see — architecture, signage, street life, materials"
        keyFigures:
          type: array
          items:
            type: string
          description: "Notable people connected to this place during this era"
        atmosphere:
          type: string
          description: "One evocative sentence capturing the mood/feel of this era"
      required:
        - period
        - title
        - description
        - atmosphere
    WalkNarrationRequest:
      type: object
      properties:
        placeName:
          type: string
        category:
          type: string
        summary:
          type: string
        fact:
          type: string
      required:
        - placeName
        - summary
    WalkNarrationResponse:
      type: object
      properties:
        narration:
          type: string
          description: "Natural-sounding narration text for TTS"
      required:
        - narration
    LatLng:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
      required:
        - latitude
        - longitude
    RouteRequest:
      type: object
      properties:
        start:
          $ref: "#/components/schemas/LatLng"
        end:
          $ref: "#/components/schemas/LatLng"
        waypoints:
          type: array
          items:
            $ref: "#/components/schemas/LatLng"
          description: "Optional intermediate waypoints, in order, between start and end"
      required:
        - start
        - end
    RouteResponse:
      type: object
      properties:
        geometry:
          type: array
          description: "Route polyline as ordered [latitude, longitude] pairs"
          items:
            type: array
            items:
              type: number
        distanceMeters:
          type: number
        durationSeconds:
          type: number
      required:
        - geometry
        - distanceMeters
        - durationSeconds
    PlacesAlongRouteRequest:
      type: object
      properties:
        geometry:
          type: array
          description: "Route polyline as ordered [latitude, longitude] pairs"
          items:
            type: array
            items:
              type: number
        maxPlaces:
          type: number
          description: "Maximum number of places to return (default 8)"
        corridorMeters:
          type: number
          description: "How far from the route to look for places, in meters (default 120)"
      required:
        - geometry
    RoutePlace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        yearBuilt:
          type: string
        tags:
          type: array
          items:
            type: string
        summary:
          type: string
        facts:
          type: array
          items:
            type: string
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
        progressMeters:
          type: number
          description: "Distance from the route start to the closest point on the route, in meters"
        offsetMeters:
          type: number
          description: "Perpendicular distance from the route to the place, in meters"
      required:
        - id
        - name
        - category
        - summary
        - facts
        - latitude
        - longitude
        - progressMeters
        - offsetMeters
    PlacesAlongRouteResponse:
      type: object
      properties:
        places:
          type: array
          items:
            $ref: "#/components/schemas/RoutePlace"
      required:
        - places
